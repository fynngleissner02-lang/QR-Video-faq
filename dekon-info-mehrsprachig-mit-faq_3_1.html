<script>
// Zeiten zentral pflegen (Minuten je Schritt; lageabhängig C/B/RN anpassbar)
const STEP_MINUTES = [2, 5, 15, 5, 5, 2];
const TOTAL_MIN = 35;

// FAQ-Inhalte (6 Fragen je Sprache)
const FAQ = {"de": {"t": "Häufige Fragen", "q": [["Mir geht es nicht gut oder ich brauche dringend Hilfe (Beschwerden, Medikamente, Toilette) – was soll ich tun?", "Schalten Sie das Warnblinklicht EIN und bleiben Sie im Fahrzeug. Eine Einsatzkraft kommt zu Ihnen. Hilfe hat immer Vorrang – Sie müssen nicht warten, bis Ihr Fahrzeug fertig ist."], ["Ich war außerhalb des Fahrzeugs oder ein Fenster war offen – muss ich selbst dekontaminiert werden?", "Sagen Sie es dem Personal bei der Einweisung – oder schalten Sie das Warnblinklicht EIN. Das Personal prüft das und begleitet Sie bei Bedarf zur Dekontamination für Personen. Sie werden nicht allein gelassen."], ["Ein Tier ist bei mir im Fahrzeug – was muss ich beachten?", "Ihr Tier bleibt bei Ihnen im Fahrzeug und ist dort geschützt. Halten Sie es vom Fenster fern und informieren Sie das Personal bei der Einweisung."], ["Soll der Motor laufen oder aus sein?", "Der Motor kann weiterlaufen. Wichtig: Die Lüftung muss AUSgeschaltet bleiben."], ["Die Messung zeigt, dass mein Fahrzeug noch nicht sauber ist – was passiert dann?", "Die Reinigung wird einfach wiederholt. Das ist normal und kein Grund zur Sorge – es dauert nur etwas länger."], ["Wohin fahre ich nach der Ausfahrt?", "Das Personal am Ausgang weist Ihnen den Weg. Folgen Sie den Anweisungen und der Beschilderung."]]}, "en": {"t": "Frequently asked questions", "q": [["I am not feeling well or I urgently need help (symptoms, medication, toilet) — what should I do?", "Turn hazard lights ON and stay in your vehicle. A staff member will come to you. Help always comes first — you do not have to wait until your vehicle is finished."], ["I was outside my vehicle, or a window was open — do I need to be decontaminated myself?", "Tell the staff during the briefing — or turn hazard lights ON. The staff will check and, if needed, take you to the decontamination for persons. You will not be left alone."], ["An animal is with me in the vehicle — what should I do?", "Your animal stays with you in the vehicle and is protected there. Keep it away from the windows and tell the staff during the briefing."], ["Should the engine be on or off?", "The engine may keep running. Important: the ventilation must stay OFF."], ["The measurement shows my vehicle is not clean yet — what happens then?", "The cleaning is simply repeated. This is normal and no reason to worry — it only takes a little longer."], ["Where do I drive after the exit?", "The staff at the exit will show you the way. Follow their instructions and the signs."]]}, "fr": {"t": "Questions fréquentes", "q": [["Je ne me sens pas bien ou j'ai besoin d'aide urgente (symptômes, médicaments, toilettes) — que faire ?", "Allumez les feux de détresse et restez dans votre véhicule. Un membre du personnel viendra à vous. L'aide passe toujours en premier — vous n'avez pas à attendre la fin du processus."], ["J'étais hors du véhicule ou une fenêtre était ouverte — dois-je être décontaminé moi-même ?", "Dites-le au personnel lors du briefing — ou allumez les feux de détresse. Le personnel vérifiera et, si nécessaire, vous accompagnera à la décontamination des personnes. Vous ne serez pas laissé seul."], ["Un animal est avec moi dans le véhicule — que faire ?", "Votre animal reste avec vous dans le véhicule et y est protégé. Tenez-le éloigné des fenêtres et informez le personnel lors du briefing."], ["Le moteur doit-il tourner ou être coupé ?", "Le moteur peut rester allumé. Important : la ventilation doit rester éteinte."], ["La mesure montre que mon véhicule n'est pas encore propre — que se passe-t-il ?", "Le nettoyage est simplement répété. C'est normal et sans danger — cela prend juste un peu plus de temps."], ["Où dois-je aller après la sortie ?", "Le personnel à la sortie vous indiquera le chemin. Suivez ses instructions et la signalisation."]]}, "es": {"t": "Preguntas frecuentes", "q": [["No me encuentro bien o necesito ayuda urgente (síntomas, medicamentos, baño): ¿qué hago?", "Encienda las luces de emergencia y permanezca en el vehículo. Un miembro del personal irá hacia usted. La ayuda siempre es lo primero: no tiene que esperar a que termine el proceso."], ["Estuve fuera del vehículo o una ventanilla estaba abierta: ¿debo ser descontaminado yo también?", "Dígaselo al personal durante las instrucciones o encienda las luces de emergencia. El personal lo comprobará y, si es necesario, lo acompañará a la descontaminación de personas. No lo dejarán solo."], ["Un animal está conmigo en el vehículo: ¿qué debo hacer?", "Su animal permanece con usted en el vehículo y allí está protegido. Manténgalo alejado de las ventanillas e informe al personal durante las instrucciones."], ["¿El motor debe estar encendido o apagado?", "El motor puede seguir en marcha. Importante: la ventilación debe permanecer apagada."], ["La medición muestra que mi vehículo aún no está limpio: ¿qué pasa entonces?", "La limpieza simplemente se repite. Es normal y no hay motivo de preocupación: solo tarda un poco más."], ["¿Adónde voy después de la salida?", "El personal en la salida le indicará el camino. Siga sus indicaciones y la señalización."]]}, "it": {"t": "Domande frequenti", "q": [["Non mi sento bene o ho urgente bisogno di aiuto (sintomi, farmaci, bagno): cosa devo fare?", "Accenda le luci di emergenza e rimanga nel veicolo. Un membro del personale verrà da lei. L'aiuto ha sempre la precedenza: non deve aspettare la fine del processo."], ["Ero fuori dal veicolo o un finestrino era aperto: devo essere decontaminato anch'io?", "Lo dica al personale durante le istruzioni oppure accenda le luci di emergenza. Il personale verificherà e, se necessario, la accompagnerà alla decontaminazione delle persone. Non sarà lasciato solo."], ["Un animale è con me nel veicolo: cosa devo fare?", "Il suo animale rimane con lei nel veicolo ed è protetto. Lo tenga lontano dai finestrini e informi il personale durante le istruzioni."], ["Il motore deve restare acceso o spento?", "Il motore può rimanere acceso. Importante: la ventilazione deve restare spenta."], ["La misurazione mostra che il veicolo non è ancora pulito: cosa succede?", "La pulizia viene semplicemente ripetuta. È normale e non c'è motivo di preoccuparsi: richiede solo un po' più di tempo."], ["Dove vado dopo l'uscita?", "Il personale all'uscita le indicherà la strada. Segua le sue indicazioni e la segnaletica."]]}, "pt": {"t": "Perguntas frequentes", "q": [["Não me sinto bem ou preciso de ajuda urgente (sintomas, medicamentos, casa de banho) — o que faço?", "Ligue o pisca-alerta e fique no veículo. Um membro do pessoal irá até si. A ajuda vem sempre primeiro — não precisa de esperar até o processo terminar."], ["Estive fora do veículo ou uma janela estava aberta — preciso de ser descontaminado?", "Diga ao pessoal durante as instruções — ou ligue o pisca-alerta. O pessoal verificará e, se necessário, acompanha-o à descontaminação de pessoas. Não ficará sozinho."], ["Um animal está comigo no veículo — o que devo fazer?", "O seu animal fica consigo no veículo e ali está protegido. Mantenha-o afastado das janelas e informe o pessoal durante as instruções."], ["O motor deve ficar ligado ou desligado?", "O motor pode continuar ligado. Importante: a ventilação deve permanecer desligada."], ["A medição mostra que o veículo ainda não está limpo — o que acontece?", "A limpeza é simplesmente repetida. É normal e não há motivo para preocupação — apenas demora um pouco mais."], ["Para onde vou depois da saída?", "O pessoal na saída indica-lhe o caminho. Siga as instruções e a sinalização."]]}, "nl": {"t": "Veelgestelde vragen", "q": [["Ik voel me niet goed of heb dringend hulp nodig (klachten, medicijnen, toilet) — wat moet ik doen?", "Zet de alarmlichten AAN en blijf in uw voertuig. Een medewerker komt naar u toe. Hulp gaat altijd voor — u hoeft niet te wachten tot uw voertuig klaar is."], ["Ik was buiten het voertuig of een raam stond open — moet ik zelf gedecontamineerd worden?", "Zeg het tegen het personeel bij de instructie — of zet de alarmlichten AAN. Het personeel controleert dit en begeleidt u zo nodig naar de decontaminatie voor personen. U wordt niet alleen gelaten."], ["Er is een dier bij mij in het voertuig — waar moet ik op letten?", "Uw dier blijft bij u in het voertuig en is daar beschermd. Houd het weg van de ramen en informeer het personeel bij de instructie."], ["Moet de motor aan of uit?", "De motor mag blijven draaien. Belangrijk: de ventilatie moet UIT blijven."], ["De meting toont dat mijn voertuig nog niet schoon is — wat gebeurt er dan?", "De reiniging wordt gewoon herhaald. Dat is normaal en geen reden tot zorg — het duurt alleen iets langer."], ["Waar rijd ik naartoe na de uitrit?", "Het personeel bij de uitgang wijst u de weg. Volg de aanwijzingen en de bewegwijzering."]]}, "pl": {"t": "Częste pytania", "q": [["Źle się czuję lub pilnie potrzebuję pomocy (dolegliwości, leki, toaleta) — co robić?", "Włącz światła awaryjne i pozostań w pojeździe. Członek personelu przyjdzie do Ciebie. Pomoc jest zawsze najważniejsza — nie musisz czekać do końca procesu."], ["Byłem/byłam poza pojazdem lub okno było otwarte — czy ja też muszę przejść dekontaminację?", "Powiedz o tym personelowi podczas instruktażu — lub włącz światła awaryjne. Personel to sprawdzi i w razie potrzeby zaprowadzi Cię do dekontaminacji osób. Nie zostaniesz sam."], ["W pojeździe jest ze mną zwierzę — co robić?", "Zwierzę zostaje z Tobą w pojeździe i jest tam chronione. Trzymaj je z dala od okien i poinformuj personel podczas instruktażu."], ["Silnik ma pracować czy być wyłączony?", "Silnik może pracować. Ważne: wentylacja musi pozostać wyłączona."], ["Pomiar pokazuje, że pojazd nie jest jeszcze czysty — co wtedy?", "Czyszczenie jest po prostu powtarzane. To normalne i nie ma powodu do obaw — trwa tylko trochę dłużej."], ["Dokąd jechać po wyjeździe?", "Personel przy wyjeździe wskaże Ci drogę. Stosuj się do poleceń i oznakowania."]]}, "cs": {"t": "Časté dotazy", "q": [["Není mi dobře nebo nutně potřebuji pomoc (potíže, léky, toaleta) — co mám dělat?", "Zapněte výstražná světla a zůstaňte ve vozidle. Člen personálu k vám přijde. Pomoc má vždy přednost — nemusíte čekat, až proces skončí."], ["Byl/a jsem mimo vozidlo nebo bylo otevřené okno — musím projít dekontaminací i já?", "Řekněte to personálu při poučení — nebo zapněte výstražná světla. Personál to ověří a v případě potřeby vás doprovodí na dekontaminaci osob. Nezůstanete sami."], ["Ve vozidle je se mnou zvíře — co mám dělat?", "Vaše zvíře zůstává s vámi ve vozidle a je tam chráněné. Držte ho dál od oken a informujte personál při poučení."], ["Má motor běžet, nebo být vypnutý?", "Motor může běžet dál. Důležité: ventilace musí zůstat vypnutá."], ["Měření ukazuje, že vozidlo ještě není čisté — co se stane?", "Čištění se jednoduše zopakuje. Je to normální a není důvod k obavám — jen to trvá o něco déle."], ["Kam mám jet po výjezdu?", "Personál u výjezdu vám ukáže cestu. Řiďte se pokyny a značením."]]}, "sk": {"t": "Časté otázky", "q": [["Nie je mi dobre alebo súrne potrebujem pomoc (ťažkosti, lieky, toaleta) — čo mám robiť?", "Zapnite výstražné svetlá a zostaňte vo vozidle. Člen personálu príde k vám. Pomoc má vždy prednosť — nemusíte čakať, kým sa proces skončí."], ["Bol/a som mimo vozidla alebo bolo otvorené okno — musím prejsť dekontamináciou aj ja?", "Povedzte to personálu pri poučení — alebo zapnite výstražné svetlá. Personál to overí a v prípade potreby vás odprevadí na dekontamináciu osôb. Nezostanete sami."], ["Vo vozidle je so mnou zviera — čo mám robiť?", "Vaše zviera zostáva s vami vo vozidle a je tam chránené. Držte ho ďalej od okien a informujte personál pri poučení."], ["Má motor bežať alebo byť vypnutý?", "Motor môže bežať ďalej. Dôležité: ventilácia musí zostať vypnutá."], ["Meranie ukazuje, že vozidlo ešte nie je čisté — čo sa stane?", "Čistenie sa jednoducho zopakuje. Je to normálne a nie je dôvod na obavy — trvá to len o niečo dlhšie."], ["Kam mám ísť po výjazde?", "Personál pri výjazde vám ukáže cestu. Riaďte sa pokynmi a značením."]]}, "uk": {"t": "Часті запитання", "q": [["Мені погано або терміново потрібна допомога (симптоми, ліки, туалет) — що робити?", "Увімкніть аварійні вогні та залишайтеся в автомобілі. Працівник прийде до вас. Допомога завжди на першому місці — не потрібно чекати завершення процесу."], ["Я був/була поза автомобілем або вікно було відчинене — чи потрібна мені особиста деконтамінація?", "Скажіть про це персоналу під час інструктажу — або увімкніть аварійні вогні. Персонал перевірить і за потреби проведе вас до деконтамінації для людей. Вас не залишать самих."], ["Зі мною в автомобілі тварина — що робити?", "Ваша тварина залишається з вами в автомобілі й там захищена. Тримайте її подалі від вікон і повідомте персонал під час інструктажу."], ["Двигун має працювати чи бути вимкненим?", "Двигун може працювати далі. Важливо: вентиляція має залишатися вимкненою."], ["Вимірювання показує, що автомобіль ще не чистий — що тоді?", "Очищення просто повторюють. Це нормально й не привід для хвилювання — просто триває трохи довше."], ["Куди їхати після виїзду?", "Персонал на виїзді покаже вам дорогу. Дотримуйтеся вказівок і знаків."]]}, "ru": {"t": "Частые вопросы", "q": [["Мне плохо или срочно нужна помощь (симптомы, лекарства, туалет) — что делать?", "Включите аварийную сигнализацию и оставайтесь в автомобиле. Сотрудник придёт к вам. Помощь всегда на первом месте — не нужно ждать окончания процесса."], ["Я был/была вне автомобиля или окно было открыто — нужна ли мне личная деконтаминация?", "Скажите об этом персоналу во время инструктажа — или включите аварийную сигнализацию. Персонал проверит и при необходимости проводит вас на деконтаминацию для людей. Вас не оставят одних."], ["Со мной в автомобиле животное — что делать?", "Ваше животное остаётся с вами в автомобиле и там защищено. Держите его подальше от окон и сообщите персоналу во время инструктажа."], ["Двигатель должен работать или быть выключенным?", "Двигатель может продолжать работать. Важно: вентиляция должна оставаться выключенной."], ["Измерение показывает, что автомобиль ещё не чист — что тогда?", "Очистка просто повторяется. Это нормально и не повод для беспокойства — займёт лишь немного больше времени."], ["Куда ехать после выезда?", "Персонал на выезде укажет вам дорогу. Следуйте указаниям и знакам."]]}, "tr": {"t": "Sık sorulan sorular", "q": [["Kendimi iyi hissetmiyorum veya acil yardıma ihtiyacım var (şikayetler, ilaç, tuvalet) — ne yapmalıyım?", "Dörtlüleri YAKIN ve aracınızda kalın. Bir görevli size gelecek. Yardım her zaman önceliklidir — işlemin bitmesini beklemek zorunda değilsiniz."], ["Aracın dışındaydım veya bir cam açıktı — benim de dekontaminasyondan geçmem gerekir mi?", "Bilgilendirme sırasında personele söyleyin — veya dörtlüleri yakın. Personel kontrol eder ve gerekirse sizi kişiler için dekontaminasyona götürür. Yalnız bırakılmazsınız."], ["Araçta yanımda bir hayvan var — ne yapmalıyım?", "Hayvanınız sizinle araçta kalır ve orada korunur. Camlardan uzak tutun ve bilgilendirme sırasında personele haber verin."], ["Motor çalışsın mı, kapalı mı olsun?", "Motor çalışmaya devam edebilir. Önemli: havalandırma KAPALI kalmalıdır."], ["Ölçüm, aracımın henüz temiz olmadığını gösteriyor — o zaman ne olur?", "Temizlik basitçe tekrarlanır. Bu normaldir ve endişelenmeye gerek yoktur — sadece biraz daha uzun sürer."], ["Çıkıştan sonra nereye gideceğim?", "Çıkıştaki personel size yolu gösterir. Talimatlara ve işaretlere uyun."]]}, "da": {"t": "Ofte stillede spørgsmål", "q": [["Jeg har det ikke godt eller har akut brug for hjælp (symptomer, medicin, toilet) — hvad gør jeg?", "Tænd havariblinket og bliv i køretøjet. En medarbejder kommer til dig. Hjælp kommer altid først — du behøver ikke vente, til processen er færdig."], ["Jeg var uden for køretøjet, eller et vindue var åbent — skal jeg selv dekontamineres?", "Sig det til personalet under instruktionen — eller tænd havariblinket. Personalet tjekker det og følger dig om nødvendigt til dekontaminering af personer. Du bliver ikke ladt alene."], ["Der er et dyr med mig i køretøjet — hvad skal jeg gøre?", "Dit dyr bliver hos dig i køretøjet og er beskyttet der. Hold det væk fra vinduerne, og informér personalet under instruktionen."], ["Skal motoren køre eller være slukket?", "Motoren må gerne køre videre. Vigtigt: Ventilationen skal forblive slukket."], ["Målingen viser, at mit køretøj endnu ikke er rent — hvad sker der så?", "Rengøringen gentages ganske enkelt. Det er normalt og ingen grund til bekymring — det tager blot lidt længere."], ["Hvor kører jeg hen efter udkørslen?", "Personalet ved udkørslen viser dig vejen. Følg anvisningerne og skiltningen."]]}, "sv": {"t": "Vanliga frågor", "q": [["Jag mår inte bra eller behöver akut hjälp (besvär, medicin, toalett) — vad gör jag?", "Slå PÅ varningsblinkers och stanna i fordonet. En medarbetare kommer till dig. Hjälp går alltid först — du behöver inte vänta tills processen är klar."], ["Jag var utanför fordonet eller ett fönster var öppet — måste jag själv dekontamineras?", "Säg det till personalen vid genomgången — eller slå på varningsblinkers. Personalen kontrollerar det och följer dig vid behov till dekontaminering av personer. Du lämnas inte ensam."], ["Ett djur är med mig i fordonet — vad ska jag göra?", "Ditt djur stannar hos dig i fordonet och är skyddat där. Håll det borta från fönstren och informera personalen vid genomgången."], ["Ska motorn vara igång eller avstängd?", "Motorn får fortsätta gå. Viktigt: ventilationen måste förbli avstängd."], ["Mätningen visar att fordonet inte är rent ännu — vad händer då?", "Rengöringen upprepas helt enkelt. Det är normalt och ingen anledning till oro — det tar bara lite längre tid."], ["Vart kör jag efter utfarten?", "Personalen vid utfarten visar dig vägen. Följ anvisningarna och skyltningen."]]}, "no": {"t": "Ofte stilte spørsmål", "q": [["Jeg føler meg ikke bra eller trenger hjelp raskt (plager, medisiner, toalett) — hva gjør jeg?", "Slå PÅ nødblinken og bli i kjøretøyet. En medarbeider kommer til deg. Hjelp går alltid først — du trenger ikke vente til prosessen er ferdig."], ["Jeg var utenfor kjøretøyet, eller et vindu var åpent — må jeg selv dekontamineres?", "Si det til personellet under instruksjonen — eller slå på nødblinken. Personellet sjekker det og følger deg om nødvendig til dekontaminering av personer. Du blir ikke overlatt til deg selv."], ["Et dyr er med meg i kjøretøyet — hva gjør jeg?", "Dyret ditt blir hos deg i kjøretøyet og er beskyttet der. Hold det unna vinduene og informer personellet under instruksjonen."], ["Skal motoren gå eller være av?", "Motoren kan fortsette å gå. Viktig: Ventilasjonen må forbli avslått."], ["Målingen viser at kjøretøyet mitt ikke er rent ennå — hva skjer da?", "Rengjøringen gjentas ganske enkelt. Det er normalt og ingen grunn til bekymring — det tar bare litt lengre tid."], ["Hvor kjører jeg etter utkjøringen?", "Personellet ved utkjøringen viser deg veien. Følg anvisningene og skiltingen."]]}, "is": {"t": "Algengar spurningar", "q": [["Mér líður ekki vel eða ég þarf hjálp strax (einkenni, lyf, salerni) — hvað geri ég?", "Kveiktu á hættuljósunum og vertu í ökutækinu. Starfsmaður kemur til þín. Hjálp gengur alltaf fyrir — þú þarft ekki að bíða þar til ferlinu lýkur."], ["Ég var utan ökutækisins eða gluggi var opinn — þarf ég sjálf(ur) að fara í afmengun?", "Segðu starfsfólkinu frá því við leiðbeiningarnar — eða kveiktu á hættuljósunum. Starfsfólkið kannar málið og fylgir þér ef þörf krefur í afmengun fyrir fólk. Þú verður ekki skilin(n) eftir ein(n)."], ["Dýr er með mér í ökutækinu — hvað geri ég?", "Dýrið þitt er áfram hjá þér í ökutækinu og er þar öruggt. Haltu því frá gluggunum og láttu starfsfólkið vita við leiðbeiningarnar."], ["Á vélin að vera í gangi eða slökkt á henni?", "Vélin má vera áfram í gangi. Mikilvægt: loftræstingin verður að vera áfram slökkt."], ["Mælingin sýnir að ökutækið mitt er ekki enn hreint — hvað gerist þá?", "Hreinsunin er einfaldlega endurtekin. Það er eðlilegt og engin ástæða til að hafa áhyggjur — það tekur bara aðeins lengri tíma."], ["Hvert ek ég eftir útkeyrsluna?", "Starfsfólkið við útganginn vísar þér veginn. Fylgdu fyrirmælum og merkingum."]]}, "fi": {"t": "Usein kysytyt kysymykset", "q": [["Voin huonosti tai tarvitsen kiireesti apua (oireet, lääkkeet, wc) — mitä teen?", "Kytke hätävilkut päälle ja pysy ajoneuvossa. Henkilökunnan jäsen tulee luoksesi. Apu on aina etusijalla — sinun ei tarvitse odottaa prosessin loppuun."], ["Olin ajoneuvon ulkopuolella tai ikkuna oli auki — pitääkö minutkin dekontaminoida?", "Kerro siitä henkilöstölle ohjeistuksen aikana — tai kytke hätävilkut päälle. Henkilöstö tarkistaa asian ja saattaa sinut tarvittaessa henkilöiden dekontaminaatioon. Sinua ei jätetä yksin."], ["Ajoneuvossa on mukanani eläin — mitä teen?", "Eläimesi pysyy kanssasi ajoneuvossa ja on siellä suojassa. Pidä se poissa ikkunoista ja kerro henkilöstölle ohjeistuksen aikana."], ["Pitääkö moottorin käydä vai olla sammutettuna?", "Moottori saa käydä. Tärkeää: ilmanvaihdon on pysyttävä pois päältä."], ["Mittaus näyttää, ettei ajoneuvoni ole vielä puhdas — mitä sitten tapahtuu?", "Puhdistus yksinkertaisesti toistetaan. Se on normaalia eikä syytä huoleen — se kestää vain hieman kauemmin."], ["Minne ajan uloskäynnin jälkeen?", "Henkilöstö uloskäynnillä näyttää sinulle tien. Noudata ohjeita ja opasteita."]]}, "et": {"t": "Korduma kippuvad küsimused", "q": [["Ma ei tunne end hästi või vajan kiiresti abi (vaevused, ravimid, tualett) — mida teha?", "Lülitage ohutuled SISSE ja jääge sõidukisse. Personali liige tuleb teie juurde. Abi on alati esikohal — te ei pea ootama protsessi lõpuni."], ["Olin sõidukist väljas või aken oli lahti — kas ka mind tuleb dekontamineerida?", "Öelge seda personalile juhendamise ajal — või lülitage ohutuled sisse. Personal kontrollib ja vajadusel saadab teid inimeste dekontaminatsiooni. Teid ei jäeta üksi."], ["Sõidukis on minuga loom — mida teha?", "Teie loom jääb teiega sõidukisse ja on seal kaitstud. Hoidke teda akendest eemal ja teavitage personali juhendamise ajal."], ["Kas mootor peab töötama või olema välja lülitatud?", "Mootor võib edasi töötada. Tähtis: ventilatsioon peab jääma VÄLJA lülitatuks."], ["Mõõtmine näitab, et sõiduk pole veel puhas — mis siis saab?", "Puhastamist lihtsalt korratakse. See on normaalne ja pole põhjust muretsemiseks — võtab vaid veidi kauem aega."], ["Kuhu sõidan pärast väljasõitu?", "Personal väljasõidul näitab teile teed. Järgige juhiseid ja viitasid."]]}, "lv": {"t": "Biežāk uzdotie jautājumi", "q": [["Es jūtos slikti vai man steidzami vajadzīga palīdzība (sūdzības, zāles, tualete) — ko darīt?", "Ieslēdziet avārijas gaismas un palieciet transportlīdzeklī. Personāla darbinieks ieradīsies pie jums. Palīdzība vienmēr ir pirmajā vietā — jums nav jāgaida procesa beigas."], ["Es biju ārpus transportlīdzekļa vai logs bija atvērts — vai arī man nepieciešama dekontaminācija?", "Pasakiet to personālam instruktāžas laikā — vai ieslēdziet avārijas gaismas. Personāls to pārbaudīs un vajadzības gadījumā pavadīs jūs uz cilvēku dekontamināciju. Jūs neatstās vienu."], ["Transportlīdzeklī kopā ar mani ir dzīvnieks — ko darīt?", "Jūsu dzīvnieks paliek pie jums transportlīdzeklī un tur ir aizsargāts. Turiet to prom no logiem un informējiet personālu instruktāžas laikā."], ["Vai dzinējam jādarbojas vai jābūt izslēgtam?", "Dzinējs var turpināt darboties. Svarīgi: ventilācijai jāpaliek izslēgtai."], ["Mērījums rāda, ka transportlīdzeklis vēl nav tīrs — kas notiek tad?", "Tīrīšana vienkārši tiek atkārtota. Tas ir normāli, un nav pamata uztraukumam — tas tikai aizņem nedaudz ilgāku laiku."], ["Kurp braukt pēc izbraukšanas?", "Personāls pie izejas parādīs jums ceļu. Ievērojiet norādījumus un zīmes."]]}, "lt": {"t": "Dažni klausimai", "q": [["Blogai jaučiuosi arba skubiai reikia pagalbos (negalavimai, vaistai, tualetas) — ką daryti?", "Įjunkite avarinius žibintus ir likite transporto priemonėje. Personalo darbuotojas ateis pas jus. Pagalba visada svarbiausia — nereikia laukti proceso pabaigos."], ["Buvau ne transporto priemonėje arba langas buvo atidarytas — ar man taip pat reikia dekontaminacijos?", "Pasakykite tai personalui per instruktažą — arba įjunkite avarinius žibintus. Personalas patikrins ir prireikus palydės jus į žmonių dekontaminaciją. Nebūsite palikti vieni."], ["Transporto priemonėje su manimi yra gyvūnas — ką daryti?", "Jūsų gyvūnas lieka su jumis transporto priemonėje ir ten yra apsaugotas. Laikykite jį atokiau nuo langų ir informuokite personalą per instruktažą."], ["Ar variklis turi veikti, ar būti išjungtas?", "Variklis gali veikti toliau. Svarbu: ventiliacija turi likti išjungta."], ["Matavimas rodo, kad transporto priemonė dar nešvari — kas tada?", "Valymas tiesiog pakartojamas. Tai normalu ir nėra priežasties nerimauti — tai tik užtrunka šiek tiek ilgiau."], ["Kur važiuoti po išvažiavimo?", "Personalas prie išvažiavimo parodys jums kelią. Laikykitės nurodymų ir ženklų."]]}, "hu": {"t": "Gyakori kérdések", "q": [["Rosszul vagyok, vagy sürgősen segítségre van szükségem (panaszok, gyógyszer, mosdó) — mit tegyek?", "Kapcsolja BE a vészvillogót, és maradjon a járműben. Egy munkatárs Önhöz megy. A segítség mindig elsőbbséget élvez — nem kell megvárnia a folyamat végét."], ["A járművön kívül voltam, vagy nyitva volt egy ablak — engem is dekontaminálni kell?", "Mondja el a személyzetnek az eligazításkor — vagy kapcsolja be a vészvillogót. A személyzet ellenőrzi, és szükség esetén elkíséri Önt a személyek dekontaminálásához. Nem hagyják magára."], ["Egy állat van velem a járműben — mit tegyek?", "Az állata Önnel marad a járműben, és ott védve van. Tartsa távol az ablakoktól, és tájékoztassa a személyzetet az eligazításkor."], ["Járjon a motor, vagy legyen leállítva?", "A motor tovább járhat. Fontos: a szellőzésnek KIkapcsolva kell maradnia."], ["A mérés azt mutatja, hogy a járművem még nem tiszta — mi történik ilyenkor?", "A tisztítást egyszerűen megismétlik. Ez normális, nincs ok aggodalomra — csak kicsit tovább tart."], ["Hová hajtsak a kihajtás után?", "A kijáratnál a személyzet megmutatja az utat. Kövesse az utasításokat és a táblákat."]]}, "ro": {"t": "Întrebări frecvente", "q": [["Nu mă simt bine sau am nevoie urgentă de ajutor (simptome, medicamente, toaletă) — ce fac?", "Porniți luminile de avarie și rămâneți în vehicul. Un membru al personalului va veni la dumneavoastră. Ajutorul are întotdeauna prioritate — nu trebuie să așteptați sfârșitul procesului."], ["Am fost în afara vehiculului sau un geam era deschis — trebuie să fiu decontaminat și eu?", "Spuneți personalului la instructaj — sau porniți luminile de avarie. Personalul va verifica și, dacă este necesar, vă va însoți la decontaminarea persoanelor. Nu veți fi lăsat singur."], ["Un animal este cu mine în vehicul — ce fac?", "Animalul dumneavoastră rămâne cu dumneavoastră în vehicul și este protejat acolo. Țineți-l departe de geamuri și informați personalul la instructaj."], ["Motorul trebuie să funcționeze sau să fie oprit?", "Motorul poate rămâne pornit. Important: ventilația trebuie să rămână oprită."], ["Măsurarea arată că vehiculul meu nu este încă curat — ce se întâmplă atunci?", "Curățarea este pur și simplu repetată. Este normal și nu este motiv de îngrijorare — durează doar puțin mai mult."], ["Unde merg după ieșire?", "Personalul de la ieșire vă arată drumul. Urmați instrucțiunile și indicatoarele."]]}, "bg": {"t": "Чести въпроси", "q": [["Не се чувствам добре или спешно се нуждая от помощ (оплаквания, лекарства, тоалетна) — какво да правя?", "Включете аварийните светлини и останете в автомобила. Служител ще дойде при вас. Помощта винаги е на първо място — не е нужно да чакате края на процеса."], ["Бях извън автомобила или прозорец беше отворен — трябва ли и аз да бъда деконтаминиран?", "Кажете на персонала по време на инструктажа — или включете аварийните светлини. Персоналът ще провери и при нужда ще ви придружи до деконтаминацията за хора. Няма да бъдете оставени сами."], ["С мен в автомобила има животно — какво да правя?", "Вашето животно остава с вас в автомобила и там е защитено. Дръжте го далеч от прозорците и уведомете персонала по време на инструктажа."], ["Двигателят да работи ли, или да е изключен?", "Двигателят може да продължи да работи. Важно: вентилацията трябва да остане изключена."], ["Измерването показва, че автомобилът ми още не е чист — какво става тогава?", "Почистването просто се повтаря. Това е нормално и няма повод за притеснение — само отнема малко повече време."], ["Накъде да карам след изхода?", "Персоналът на изхода ще ви покаже пътя. Следвайте указанията и знаците."]]}, "el": {"t": "Συχνές ερωτήσεις", "q": [["Δεν αισθάνομαι καλά ή χρειάζομαι επειγόντως βοήθεια (συμπτώματα, φάρμακα, τουαλέτα) — τι να κάνω;", "Ανάψτε τα αλάρμ και μείνετε στο όχημα. Ένα μέλος του προσωπικού θα έρθει σε εσάς. Η βοήθεια προηγείται πάντα — δεν χρειάζεται να περιμένετε να τελειώσει η διαδικασία."], ["Ήμουν έξω από το όχημα ή ένα παράθυρο ήταν ανοιχτό — χρειάζομαι κι εγώ απορρύπανση;", "Πείτε το στο προσωπικό κατά την ενημέρωση — ή ανάψτε τα αλάρμ. Το προσωπικό θα το ελέγξει και, αν χρειαστεί, θα σας συνοδεύσει στην απορρύπανση προσώπων. Δεν θα μείνετε μόνοι."], ["Ένα ζώο είναι μαζί μου στο όχημα — τι να κάνω;", "Το ζώο σας μένει μαζί σας στο όχημα και εκεί προστατεύεται. Κρατήστε το μακριά από τα παράθυρα και ενημερώστε το προσωπικό κατά την ενημέρωση."], ["Να δουλεύει ο κινητήρας ή να είναι σβηστός;", "Ο κινητήρας μπορεί να συνεχίσει να λειτουργεί. Σημαντικό: ο εξαερισμός πρέπει να παραμείνει κλειστός."], ["Η μέτρηση δείχνει ότι το όχημά μου δεν είναι ακόμη καθαρό — τι γίνεται τότε;", "Ο καθαρισμός απλώς επαναλαμβάνεται. Είναι φυσιολογικό και δεν υπάρχει λόγος ανησυχίας — απλώς διαρκεί λίγο περισσότερο."], ["Πού πηγαίνω μετά την έξοδο;", "Το προσωπικό στην έξοδο θα σας δείξει τον δρόμο. Ακολουθήστε τις οδηγίες και τη σήμανση."]]}, "hr": {"t": "Česta pitanja", "q": [["Nije mi dobro ili hitno trebam pomoć (tegobe, lijekovi, WC) — što učiniti?", "Uključite sva četiri žmigavca i ostanite u vozilu. Član osoblja doći će k vama. Pomoć uvijek ima prednost — ne morate čekati kraj postupka."], ["Bio/bila sam izvan vozila ili je prozor bio otvoren — moram li i ja na dekontaminaciju?", "Recite to osoblju pri uputama — ili uključite sva četiri žmigavca. Osoblje će provjeriti i po potrebi vas otpratiti na dekontaminaciju osoba. Nećete biti ostavljeni sami."], ["Sa mnom je u vozilu životinja — što učiniti?", "Vaša životinja ostaje s vama u vozilu i tamo je zaštićena. Držite je podalje od prozora i obavijestite osoblje pri uputama."], ["Treba li motor raditi ili biti ugašen?", "Motor može nastaviti raditi. Važno: ventilacija mora ostati isključena."], ["Mjerenje pokazuje da moje vozilo još nije čisto — što se tada događa?", "Čišćenje se jednostavno ponavlja. To je normalno i nema razloga za brigu — samo traje malo dulje."], ["Kamo vozim nakon izlaza?", "Osoblje na izlazu pokazat će vam put. Slijedite upute i oznake."]]}, "bs": {"t": "Česta pitanja", "q": [["Nije mi dobro ili hitno trebam pomoć (tegobe, lijekovi, WC) — šta da radim?", "Uključite sva četiri žmigavca i ostanite u vozilu. Član osoblja će doći do vas. Pomoć uvijek ima prednost — ne morate čekati kraj postupka."], ["Bio/bila sam izvan vozila ili je prozor bio otvoren — moram li i ja na dekontaminaciju?", "Recite to osoblju prilikom uputa — ili uključite sva četiri žmigavca. Osoblje će provjeriti i po potrebi vas otpratiti na dekontaminaciju osoba. Nećete biti ostavljeni sami."], ["Sa mnom je u vozilu životinja — šta da radim?", "Vaša životinja ostaje s vama u vozilu i tamo je zaštićena. Držite je podalje od prozora i obavijestite osoblje prilikom uputa."], ["Treba li motor raditi ili biti ugašen?", "Motor može nastaviti raditi. Važno: ventilacija mora ostati isključena."], ["Mjerenje pokazuje da moje vozilo još nije čisto — šta se tada dešava?", "Čišćenje se jednostavno ponavlja. To je normalno i nema razloga za brigu — samo traje malo duže."], ["Kuda vozim nakon izlaza?", "Osoblje na izlazu će vam pokazati put. Slijedite uputstva i oznake."]]}, "cnr": {"t": "Česta pitanja", "q": [["Nije mi dobro ili hitno trebam pomoć (tegobe, ljekovi, WC) — šta da radim?", "Uključite sva četiri žmigavca i ostanite u vozilu. Član osoblja će doći do vas. Pomoć uvijek ima prednost — ne morate čekati kraj postupka."], ["Bio/bila sam izvan vozila ili je prozor bio otvoren — moram li i ja na dekontaminaciju?", "Recite to osoblju prilikom uputstava — ili uključite sva četiri žmigavca. Osoblje će provjeriti i po potrebi vas otpratiti na dekontaminaciju osoba. Nećete biti ostavljeni sami."], ["Sa mnom je u vozilu životinja — šta da radim?", "Vaša životinja ostaje s vama u vozilu i tamo je zaštićena. Držite je podalje od prozora i obavijestite osoblje prilikom uputstava."], ["Treba li motor da radi ili da bude ugašen?", "Motor može nastaviti da radi. Važno: ventilacija mora ostati isključena."], ["Mjerenje pokazuje da moje vozilo još nije čisto — šta se tada dešava?", "Čišćenje se jednostavno ponavlja. To je normalno i nema razloga za brigu — samo traje malo duže."], ["Kuda vozim nakon izlaza?", "Osoblje na izlazu će vam pokazati put. Slijedite uputstva i oznake."]]}, "sr": {"t": "Честа питања", "q": [["Није ми добро или хитно требам помоћ (тегобе, лекови, тоалет) — шта да радим?", "Укључите сва четири мигавца и останите у возилу. Члан особља ће доћи до вас. Помоћ увек има предност — не морате чекати крај поступка."], ["Био/била сам изван возила или је прозор био отворен — морам ли и ја на деконтаминацију?", "Реците то особљу приликом упутстава — или укључите сва четири мигавца. Особље ће проверити и по потреби вас отпратити на деконтаминацију особа. Нећете бити остављени сами."], ["Са мном је у возилу животиња — шта да радим?", "Ваша животиња остаје с вама у возилу и тамо је заштићена. Држите је даље од прозора и обавестите особље приликом упутстава."], ["Треба ли мотор да ради или да буде угашен?", "Мотор може наставити да ради. Важно: вентилација мора остати искључена."], ["Мерење показује да моје возило још није чисто — шта се тада дешава?", "Чишћење се једноставно понавља. То је нормално и нема разлога за бригу — само траје мало дуже."], ["Куда возим након излаза?", "Особље на излазу ће вам показати пут. Следите упутства и ознаке."]]}, "mk": {"t": "Чести прашања", "q": [["Не ми е добро или итно ми треба помош (тегоби, лекови, тоалет) — што да правам?", "Вклучете ги сите четири трепкачи и останете во возилото. Член на персоналот ќе дојде кај вас. Помошта секогаш има предност — не морате да чекате до крајот на постапката."], ["Бев надвор од возилото или прозорец беше отворен — дали и јас треба на деконтаминација?", "Кажете му на персоналот при инструктажата — или вклучете ги трепкачите. Персоналот ќе провери и по потреба ќе ве придружи до деконтаминација за лица. Нема да бидете оставени сами."], ["Со мене во возилото има животно — што да правам?", "Вашето животно останува со вас во возилото и таму е заштитено. Држете го подалеку од прозорците и известете го персоналот при инструктажата."], ["Дали моторот треба да работи или да биде изгаснат?", "Моторот може да продолжи да работи. Важно: вентилацијата мора да остане исклучена."], ["Мерењето покажува дека возилото уште не е чисто — што се случува тогаш?", "Чистењето едноставно се повторува. Тоа е нормално и нема причина за грижа — само трае малку подолго."], ["Каде да возам по излезот?", "Персоналот на излезот ќе ви го покаже патот. Следете ги упатствата и ознаките."]]}, "sq": {"t": "Pyetje të shpeshta", "q": [["Nuk ndihem mirë ose kam nevojë urgjente për ndihmë (simptoma, ilaçe, tualet) — çfarë të bëj?", "Ndizni dritat e alarmit dhe qëndroni në automjet. Një anëtar i personelit do të vijë tek ju. Ndihma ka gjithmonë përparësi — nuk duhet të prisni deri në fund të procesit."], ["Isha jashtë automjetit ose një dritare ishte e hapur — a duhet të dekontaminohem edhe unë?", "Tregojini personelit gjatë udhëzimit — ose ndizni dritat e alarmit. Personeli do ta kontrollojë dhe, nëse është e nevojshme, do t'ju shoqërojë te dekontaminimi për persona. Nuk do të liheni vetëm."], ["Një kafshë është me mua në automjet — çfarë të bëj?", "Kafsha juaj qëndron me ju në automjet dhe atje është e mbrojtur. Mbajeni larg dritareve dhe njoftoni personelin gjatë udhëzimit."], ["A duhet të punojë motori apo të jetë i fikur?", "Motori mund të vazhdojë të punojë. E rëndësishme: ventilimi duhet të mbetet i fikur."], ["Matja tregon se automjeti im nuk është ende i pastër — çfarë ndodh atëherë?", "Pastrimi thjesht përsëritet. Kjo është normale dhe nuk ka arsye për shqetësim — vetëm zgjat pak më shumë."], ["Ku të shkoj pas daljes?", "Personeli te dalja do t'ju tregojë rrugën. Ndiqni udhëzimet dhe sinjalistikën."]]}, "ga": {"t": "Ceisteanna coitianta", "q": [["Ní bhraithim go maith nó tá cabhair de dhíth orm go práinneach (airíonna, cógais, leithreas) — cad ba chóir dom a dhéanamh?", "Cuir na soilse guaise ar siúl agus fan i d'fheithicil. Tiocfaidh ball foirne chugat. Bíonn tosaíocht ag cabhair i gcónaí — ní gá duit fanacht go dtí deireadh an phróisis."], ["Bhí mé taobh amuigh den fheithicil nó bhí fuinneog ar oscailt — an gá mé féin a dhí-éilliú?", "Inis don fhoireann le linn na treorach — nó cuir na soilse guaise ar siúl. Seiceálfaidh an fhoireann é agus, más gá, rachaidh siad leat chuig dí-éilliú do dhaoine. Ní fhágfar i d'aonar thú."], ["Tá ainmhí liom san fheithicil — cad ba chóir dom a dhéanamh?", "Fanann d'ainmhí leat san fheithicil agus tá sé cosanta ansin. Coinnigh amach ó na fuinneoga é agus cuir an fhoireann ar an eolas le linn na treorach."], ["Ar chóir don inneall a bheith ar siúl nó múchta?", "Is féidir leis an inneall leanúint ar aghaidh ag rith. Tábhachtach: caithfidh an t-aerú fanacht múchta."], ["Léiríonn an tomhas nach bhfuil m'fheithicil glan go fóill — cad a tharlaíonn ansin?", "Déantar an glanadh arís, sin uile. Tá sé sin gnách agus níl aon chúis imní ann — tógann sé beagán níos faide, sin an méid."], ["Cá dtiomáinim tar éis an bhealaigh amach?", "Taispeánfaidh an fhoireann ag an mbealach amach an treo duit. Lean a dtreoracha agus na comharthaí."]]}, "mt": {"t": "Mistoqsijiet frekwenti", "q": [["Ma nħossnix tajjeb jew għandi bżonn urġenti ta' għajnuna (sintomi, mediċini, tojlit) — x'nagħmel?", "Ixgħel id-dwal ta' emerġenza u ibqa' fil-vettura. Membru tal-persunal jiġi għandek. L-għajnuna dejjem tiġi l-ewwel — m'għandekx għalfejn tistenna sa tmiem il-proċess."], ["Kont barra mill-vettura jew tieqa kienet miftuħa — irrid niġi dekontaminat jien ukoll?", "Għid lill-persunal waqt l-istruzzjonijiet — jew ixgħel id-dwal ta' emerġenza. Il-persunal jiċċekkja u, jekk hemm bżonn, jakkumpanjak għad-dekontaminazzjoni tal-persuni. Ma titħalliex waħdek."], ["Annimal qiegħed miegħi fil-vettura — x'nagħmel?", "L-annimal tiegħek jibqa' miegħek fil-vettura u hemmhekk huwa protett. Żommu 'l bogħod mit-twieqi u informa lill-persunal waqt l-istruzzjonijiet."], ["Il-magna għandha tibqa' taħdem jew tintefa?", "Il-magna tista' tibqa' taħdem. Importanti: il-ventilazzjoni trid tibqa' mitfija."], ["Il-kejl juri li l-vettura tiegħi għadha mhix nadifa — x'jiġri mbagħad?", "It-tindif sempliċement jiġi ripetut. Dan huwa normali u m'hemmx għalfejn tinkwieta — jieħu biss ftit iktar żmien."], ["Fejn immur wara l-ħruġ?", "Il-persunal fil-ħruġ juruk it-triq. Segwi l-istruzzjonijiet u s-sinjali."]]}, "sl": {"t": "Pogosta vprašanja", "q": [["Ne počutim se dobro ali nujno potrebujem pomoč (težave, zdravila, stranišče) — kaj naj storim?", "Vklopite varnostne utripalke in ostanite v vozilu. Član osebja bo prišel k vam. Pomoč ima vedno prednost — ni vam treba čakati do konca postopka."], ["Bil/a sem zunaj vozila ali pa je bilo okno odprto — ali moram tudi jaz na dekontaminacijo?", "Povejte osebju med navodili — ali vklopite varnostne utripalke. Osebje bo preverilo in vas po potrebi pospremilo na dekontaminacijo oseb. Ne boste ostali sami."], ["Z mano v vozilu je žival — kaj naj storim?", "Vaša žival ostane z vami v vozilu in je tam zaščitena. Držite jo stran od oken in obvestite osebje med navodili."], ["Naj motor deluje ali naj bo ugasnjen?", "Motor lahko deluje naprej. Pomembno: prezračevanje mora ostati izklopljeno."], ["Meritev kaže, da moje vozilo še ni čisto — kaj se zgodi potem?", "Čiščenje se preprosto ponovi. To je normalno in ni razloga za skrb — traja le nekoliko dlje."], ["Kam naj peljem po izvozu?", "Osebje na izhodu vam bo pokazalo pot. Sledite navodilom in oznakam."]]}, "ca": {"t": "Preguntes freqüents", "q": [["No em trobo bé o necessito ajuda urgent (símptomes, medicaments, lavabo) — què he de fer?", "Encengui els llums d'emergència i quedi's dins del vehicle. Un membre del personal vindrà cap a vostè. L'ajuda sempre és el primer — no cal esperar que el vehicle estigui enllestit."], ["Era fora del vehicle o una finestra estava oberta — m'he de descontaminar jo també?", "Digui-ho al personal durant les instruccions — o encengui els llums d'emergència. El personal ho comprovarà i, si cal, l'acompanyarà a la descontaminació de persones. No el deixaran sol."], ["Hi ha un animal amb mi al vehicle — què he de fer?", "El seu animal es queda amb vostè al vehicle i allà està protegit. Mantingui'l allunyat de les finestres i informi el personal durant les instruccions."], ["El motor ha d'estar engegat o apagat?", "El motor pot continuar en marxa. Important: la ventilació ha de quedar apagada."], ["La mesura mostra que el meu vehicle encara no està net — què passa llavors?", "La neteja simplement es repeteix. És normal i no hi ha motiu de preocupació — només triga una mica més."], ["On he d'anar després de la sortida?", "El personal a la sortida li indicarà el camí. Segueixi les seves indicacions i la senyalització."]]}, "gl": {"t": "Preguntas frecuentes", "q": [["Non me atopo ben ou necesito axuda urxente (síntomas, medicamentos, baño) — que debo facer?", "Acenda as luces de emerxencia e permaneza no vehículo. Un membro do persoal irá cara a vostede. A axuda sempre é o primeiro — non ten que agardar a que o vehículo estea rematado."], ["Estaba fóra do vehículo ou unha fiestra estaba aberta — teño que descontaminarme eu tamén?", "Dígallo ao persoal durante as instrucións — ou acenda as luces de emerxencia. O persoal comprobarao e, se é necesario, acompañarao á descontaminación de persoas. Non o deixarán só."], ["Hai un animal comigo no vehículo — que debo facer?", "O seu animal queda con vostede no vehículo e alí está protexido. Manteñao lonxe das fiestras e informe o persoal durante as instrucións."], ["O motor debe estar acendido ou apagado?", "O motor pode seguir en marcha. Importante: a ventilación debe permanecer apagada."], ["A medición amosa que o meu vehículo aínda non está limpo — que pasa entón?", "A limpeza simplemente repítese. É normal e non hai motivo de preocupación — só tarda un pouco máis."], ["A onde vou despois da saída?", "O persoal na saída indicaralle o camiño. Siga as súas indicacións e a sinalización."]]}, "eu": {"t": "Ohiko galderak", "q": [["Ez nago ondo edo laguntza premiazkoa behar dut (sintomak, botikak, komuna) — zer egin behar dut?", "Piztu larrialdi-argiak eta egon ibilgailuan. Langile bat zuregana etorriko da. Laguntza beti da lehena — ez duzu itxaron behar ibilgailua amaitu arte."], ["Ibilgailutik kanpo nengoen edo leiho bat irekita zegoen — ni ere deskontaminatu behar naute?", "Esan langileei argibideak ematerakoan — edo piztu larrialdi-argiak. Langileek egiaztatuko dute eta, beharrezkoa bada, pertsonentzako deskontaminaziora eramango zaituzte. Ez zaituzte bakarrik utziko."], ["Animalia bat dago nirekin ibilgailuan — zer egin behar dut?", "Zure animalia zurekin geratzen da ibilgailuan eta han babestuta dago. Mantendu leihoetatik urrun eta jakinarazi langileei argibideak ematerakoan."], ["Motorrak martxan egon behar du ala itzalita?", "Motorrak martxan jarrai dezake. Garrantzitsua: aireztapenak itzalita egon behar du."], ["Neurketak erakusten du nire ibilgailua oraindik ez dagoela garbi — zer gertatzen da orduan?", "Garbiketa besterik gabe errepikatzen da. Normala da eta ez dago kezkatzeko arrazoirik — pixka bat gehiago irauten du soilik."], ["Nora joan behar dut irteeraren ondoren?", "Irteerako langileek bidea erakutsiko dizute. Jarraitu haien argibideei eta seinaleei."]]}, "cy": {"t": "Cwestiynau cyffredin", "q": [["Dydw i ddim yn teimlo'n dda neu mae angen help arnaf ar frys (symptomau, meddyginiaeth, toiled) — beth ddylwn i ei wneud?", "Trowch y goleuadau rhybudd ymlaen ac arhoswch yn eich cerbyd. Bydd aelod o staff yn dod atoch chi. Mae help bob amser yn dod gyntaf — does dim rhaid i chi aros nes bod eich cerbyd wedi gorffen."], ["Roeddwn i y tu allan i'r cerbyd, neu roedd ffenestr ar agor — a oes angen i mi gael fy nihalogi fy hun?", "Dywedwch wrth y staff yn ystod y cyfarwyddiadau — neu trowch y goleuadau rhybudd ymlaen. Bydd y staff yn gwirio ac, os oes angen, yn mynd â chi i'r dihalogi ar gyfer pobl. Ni chewch eich gadael ar eich pen eich hun."], ["Mae anifail gyda mi yn y cerbyd — beth ddylwn i ei wneud?", "Mae eich anifail yn aros gyda chi yn y cerbyd ac mae'n cael ei ddiogelu yno. Cadwch ef i ffwrdd o'r ffenestri a dywedwch wrth y staff yn ystod y cyfarwyddiadau."], ["A ddylai'r injan fod ymlaen neu i ffwrdd?", "Caiff yr injan barhau i redeg. Pwysig: rhaid i'r system awyru aros i ffwrdd."], ["Mae'r mesuriad yn dangos nad yw fy ngherbyd yn lân eto — beth sy'n digwydd wedyn?", "Caiff y glanhau ei ailadrodd yn syml. Mae hyn yn normal a does dim rheswm i boeni — dim ond ychydig yn hirach y mae'n ei gymryd."], ["I ble rydw i'n gyrru ar ôl yr allanfa?", "Bydd y staff wrth yr allanfa yn dangos y ffordd i chi. Dilynwch eu cyfarwyddiadau a'r arwyddion."]]}, "be": {"t": "Частыя пытанні", "q": [["Мне дрэнна ці тэрмінова патрэбна дапамога (сімптомы, лекі, прыбіральня) — што рабіць?", "Уключыце аварыйную сігналізацыю і заставайцеся ў аўтамабілі. Супрацоўнік прыйдзе да вас. Дапамога заўсёды на першым месцы — не трэба чакаць заканчэння працэсу."], ["Я быў/была па-за аўтамабілем ці акно было адчынена — ці патрэбна мне асабістая дэкантамінацыя?", "Скажыце пра гэта персаналу падчас інструктажу — ці ўключыце аварыйную сігналізацыю. Персанал праверыць і пры неабходнасці правядзе вас на дэкантамінацыю для людзей. Вас не пакінуць адных."], ["Са мной у аўтамабілі жывёла — што рабіць?", "Ваша жывёла застаецца з вамі ў аўтамабілі і там абаронена. Трымайце яе далей ад вокнаў і паведаміце персаналу падчас інструктажу."], ["Рухавік павінен працаваць ці быць выключаным?", "Рухавік можа працягваць працаваць. Важна: вентыляцыя павінна заставацца выключанай."], ["Вымярэнне паказвае, што мой аўтамабіль яшчэ не чысты — што тады?", "Ачыстку проста паўтараюць. Гэта нармальна і няма падставы для хвалявання — гэта проста зойме крыху больш часу."], ["Куды ехаць пасля выезду?", "Персанал на выездзе пакажа вам дарогу. Выконвайце ўказанні і знакі."]]}, "hy": {"t": "Հաճախ տրվող հարցեր", "q": [["Ինձ լավ չեմ զգում կամ շտապ օգնության կարիք ունեմ (ախտանիշներ, դեղորայք, զուգարան) — ի՞նչ անեմ։", "Միացրեք վթարային լույսերը և մնացեք ձեր մեքենայում։ Անձնակազմի աշխատակիցը կգա ձեզ մոտ։ Օգնությունը միշտ առաջնահերթ է — պետք չէ սպասել, մինչև գործընթացն ավարտվի։"], ["Ես մեքենայից դուրս էի, կամ պատուհանը բաց էր — ի՞նձ նույնպես պետք է ապականազերծել։", "Ասեք անձնակազմին հրահանգավորման ժամանակ — կամ միացրեք վթարային լույսերը։ Անձնակազմը կստուգի և անհրաժեշտության դեպքում ձեզ կուղեկցի մարդկանց ապականազերծման։ Ձեզ մենակ չեն թողնի։"], ["Մեքենայում ինձ հետ կենդանի կա — ի՞նչ անեմ։", "Ձեր կենդանին մնում է ձեզ հետ մեքենայում և այնտեղ պաշտպանված է։ Հեռու պահեք այն պատուհաններից և տեղեկացրեք անձնակազմին հրահանգավորման ժամանակ։"], ["Շարժիչը պետք է աշխատի՞, թե՞ անջատված լինի։", "Շարժիչը կարող է շարունակել աշխատել։ Կարևոր է՝ օդափոխությունը պետք է մնա անջատված։"], ["Չափումը ցույց է տալիս, որ իմ մեքենան դեռ մաքուր չէ — ի՞նչ է լինում այդ դեպքում։", "Մաքրումը պարզապես կրկնվում է։ Դա նորմալ է և անհանգստանալու պատճառ չկա — պարզապես մի փոքր ավելի երկար է տևում։"], ["Ելքից հետո ո՞ւր գնամ։", "Ելքի մոտ գտնվող անձնակազմը ձեզ ցույց կտա ճանապարհը։ Հետևեք նրանց ցուցումներին և նշաններին։"]]}};

const L = [
{c:"bs",n:"Bosanski",t:{title:"Dekontaminacija vozila — Šta slijedi",intro:"Nalazite se na mjestu za dekontaminaciju. Obučeno osoblje će očistiti vaše vozilo. Na sigurnom ste. Molimo pročitajte ova pravila.",rt:"Važna pravila",r:["Isključite ventilaciju.","Ostanite u vozilu. Držite prozore zatvorene.","Hitan slučaj? Uključite sva četiri žmigavca. Pomoć će doći do vas."],time:"Ukupno vrijeme: oko 35 minuta",st:"6 koraka",s:[["Upute","Osoblje vam daje upute."],["Pretpranje","Vozilo se ispire vodom."],["Sredstvo za dekontaminaciju","Sredstvo se nanosi. Molimo pričekajte."],["Završno ispiranje","Sredstvo se ispire."],["Mjerenje","Mjerenje potvrđuje da je vozilo čisto."],["Izlaz","Možete izaći."]],f:"Uvijek slijedite uputstva osoblja.",lb:"Jezik"}},
{c:"cnr",n:"Crnogorski",t:{title:"Dekontaminacija vozila — Šta slijedi",intro:"Nalazite se na mjestu za dekontaminaciju. Obučeno osoblje će očistiti vaše vozilo. Bezbjedni ste. Molimo pročitajte ova pravila.",rt:"Važna pravila",r:["Isključite ventilaciju.","Ostanite u vozilu. Držite prozore zatvorene.","Hitan slučaj? Uključite sva četiri žmigavca. Pomoć će doći do vas."],time:"Ukupno vrijeme: oko 35 minuta",st:"6 koraka",s:[["Uputstva","Osoblje vam daje uputstva."],["Pretpranje","Vozilo se ispira vodom."],["Sredstvo za dekontaminaciju","Sredstvo se nanosi. Molimo sačekajte."],["Završno ispiranje","Sredstvo se ispira."],["Mjerenje","Mjerenje potvrđuje da je vozilo čisto."],["Izlaz","Možete izaći."]],f:"Uvijek slijedite uputstva osoblja.",lb:"Jezik"}},
{c:"cs",n:"Čeština",t:{title:"Dekontaminace vozidla — Co se bude dít",intro:"Nacházíte se na dekontaminačním stanovišti. Vyškolený personál vyčistí vaše vozidlo. Jste v bezpečí. Přečtěte si prosím tato pravidla.",rt:"Důležitá pravidla",r:["Vypněte ventilaci.","Zůstaňte ve vozidle. Nechte okna zavřená.","Nouzová situace? Zapněte výstražná světla. Pomoc přijde k vám."],time:"Celková doba: cca 35 minut",st:"6 kroků",s:[["Poučení","Personál vám dá pokyny."],["Předmytí","Vozidlo se opláchne vodou."],["Dekontaminační prostředek","Prostředek se nanese. Prosím vyčkejte."],["Konečný oplach","Prostředek se smyje."],["Měření","Měření potvrdí, že je vozidlo čisté."],["Výjezd","Můžete vyjet."]],f:"Vždy se řiďte pokyny personálu.",lb:"Jazyk"}},
{c:"da",n:"Dansk",t:{title:"Dekontaminering af køretøj — Hvad sker der nu",intro:"Du er ved en dekontamineringsstation. Uddannet personale rengør dit køretøj. Du er i sikkerhed. Læs venligst disse regler.",rt:"Vigtige regler",r:["Sluk ventilationen.","Bliv i dit køretøj. Hold vinduerne lukkede.","Nødsituation? Tænd havariblinket. Hjælpen kommer til dig."],time:"Samlet tid: ca. 35 minutter",st:"De 6 trin",s:[["Instruktion","Personalet giver dig anvisninger."],["Forvask","Dit køretøj skylles med vand."],["Dekontamineringsmiddel","Midlet påføres. Vent venligst."],["Efterskyl","Midlet vaskes af."],["Måling","En måling bekræfter, at dit køretøj er rent."],["Udkørsel","Du må køre ud."]],f:"Følg altid personalets anvisninger.",lb:"Sprog"}},
{c:"de",n:"Deutsch",t:{title:"Fahrzeug-Dekontamination — Was jetzt passiert",intro:"Sie sind an einer Dekontaminationsstelle. Geschultes Personal reinigt Ihr Fahrzeug. Sie sind in Sicherheit. Bitte lesen Sie diese Regeln.",rt:"Wichtige Regeln",r:["Lüftung AUSschalten.","Im Fahrzeug bleiben. Fenster geschlossen halten.","Notfall? Warnblinklicht EINschalten. Hilfe kommt zu Ihnen."],time:"Gesamtdauer: ca. 35 Minuten",st:"Der Ablauf in 6 Schritten",s:[["Einweisung","Das Personal gibt Ihnen Anweisungen."],["Vorreinigung","Ihr Fahrzeug wird mit Wasser abgespült."],["Dekontaminationsmittel","Das Mittel wird aufgetragen. Bitte warten."],["Nachreinigung","Das Mittel wird abgewaschen."],["Messung","Eine Messung bestätigt: Ihr Fahrzeug ist sauber."],["Ausfahrt","Sie dürfen hinausfahren."]],f:"Folgen Sie immer den Anweisungen des Personals.",lb:"Sprache"}},
{c:"et",n:"Eesti",t:{title:"Sõiduki dekontaminatsioon — Mis nüüd juhtub",intro:"Olete dekontaminatsioonipunktis. Koolitatud personal puhastab teie sõiduki. Olete ohutus kohas. Palun lugege neid reegleid.",rt:"Olulised reeglid",r:["Lülitage ventilatsioon VÄLJA.","Jääge sõidukisse. Hoidke aknad suletud.","Hädaolukord? Lülitage ohutuled SISSE. Abi tuleb teie juurde."],time:"Koguaeg: u 35 minutit",st:"6 sammu",s:[["Juhendamine","Personal annab teile juhised."],["Eelpesu","Sõiduk loputatakse veega."],["Dekontaminatsioonivahend","Vahend kantakse peale. Palun oodake."],["Lõpploputus","Vahend pestakse maha."],["Mõõtmine","Mõõtmine kinnitab, et sõiduk on puhas."],["Väljasõit","Võite välja sõita."]],f:"Järgige alati personali juhiseid.",lb:"Keel"}},
{c:"en",n:"English",t:{title:"Vehicle Decontamination — What Happens Now",intro:"You are at a decontamination station. Trained staff will clean your vehicle. You are safe. Please read these rules.",rt:"Important rules",r:["Turn ventilation OFF.","Stay inside your vehicle. Keep windows closed.","Emergency? Turn hazard lights ON. Help will come to you."],time:"Total time: approx. 35 minutes",st:"The 6 steps",s:[["Briefing","Staff gives you instructions."],["Pre-wash","Your vehicle is rinsed with water."],["Decontamination agent","The agent is applied. Please wait."],["Final rinse","The agent is washed off."],["Check","A measurement confirms your vehicle is clean."],["Exit","You may drive out."]],f:"Always follow the instructions of the staff.",lb:"Language"}},
{c:"es",n:"Español",t:{title:"Descontaminación del vehículo — Qué va a pasar",intro:"Está en un puesto de descontaminación. Personal capacitado limpiará su vehículo. Está a salvo. Lea estas reglas, por favor.",rt:"Reglas importantes",r:["Apague la ventilación.","Permanezca dentro del vehículo. Mantenga las ventanillas cerradas.","¿Emergencia? Encienda las luces de emergencia. La ayuda irá hacia usted."],time:"Duración total: aprox. 35 minutos",st:"Los 6 pasos",s:[["Instrucciones","El personal le dará indicaciones."],["Prelavado","Su vehículo se enjuaga con agua."],["Agente descontaminante","Se aplica el agente. Espere, por favor."],["Enjuague final","Se lava el agente."],["Control","Una medición confirma que su vehículo está limpio."],["Salida","Puede salir."]],f:"Siga siempre las indicaciones del personal.",lb:"Idioma"}},
{c:"fr",n:"Français",t:{title:"Décontamination du véhicule — Ce qui va se passer",intro:"Vous êtes à un poste de décontamination. Un personnel formé nettoie votre véhicule. Vous êtes en sécurité. Veuillez lire ces règles.",rt:"Règles importantes",r:["Éteignez la ventilation.","Restez dans votre véhicule. Gardez les fenêtres fermées.","Urgence ? Allumez les feux de détresse. De l'aide viendra à vous."],time:"Durée totale : env. 35 minutes",st:"Les 6 étapes",s:[["Briefing","Le personnel vous donne des instructions."],["Prélavage","Votre véhicule est rincé à l'eau."],["Produit de décontamination","Le produit est appliqué. Veuillez patienter."],["Rinçage final","Le produit est lavé."],["Contrôle","Une mesure confirme que votre véhicule est propre."],["Sortie","Vous pouvez sortir."]],f:"Suivez toujours les instructions du personnel.",lb:"Langue"}},
{c:"ga",n:"Gaeilge",t:{title:"Dí-éilliú feithicle — Cad a tharlóidh anois",intro:"Tá tú ag stáisiún dí-éillithe. Glanfaidh foireann oilte d'fheithicil. Tá tú slán. Léigh na rialacha seo, le do thoil.",rt:"Rialacha tábhachtacha",r:["Múch an t-aerú.","Fan i d'fheithicil. Coinnigh na fuinneoga dúnta.","Éigeandáil? Cuir na soilse guaise ar siúl. Tiocfaidh cabhair chugat."],time:"Am iomlán: thart ar 35 nóiméad",st:"Na 6 chéim",s:[["Treoir","Tugann an fhoireann treoracha duit."],["Réamhní","Sruthlaítear an fheithicil le huisce."],["Oibreán dí-éillithe","Cuirtear an t-oibreán air. Fan, le do thoil."],["Sruthlú deiridh","Nitear an t-oibreán de."],["Tomhas","Deimhníonn tomhas go bhfuil an fheithicil glan."],["Amach","Is féidir leat tiomáint amach."]],f:"Lean treoracha na foirne i gcónaí.",lb:"Teanga"}},
{c:"hr",n:"Hrvatski",t:{title:"Dekontaminacija vozila — Što slijedi",intro:"Nalazite se na mjestu za dekontaminaciju. Obučeno osoblje očistit će vaše vozilo. Na sigurnom ste. Molimo pročitajte ova pravila.",rt:"Važna pravila",r:["Isključite ventilaciju.","Ostanite u vozilu. Držite prozore zatvorenima.","Hitan slučaj? Uključite sva četiri žmigavca. Pomoć će doći k vama."],time:"Ukupno vrijeme: oko 35 minuta",st:"6 koraka",s:[["Upute","Osoblje vam daje upute."],["Pretpranje","Vozilo se ispire vodom."],["Sredstvo za dekontaminaciju","Sredstvo se nanosi. Molimo pričekajte."],["Završno ispiranje","Sredstvo se ispire."],["Mjerenje","Mjerenje potvrđuje da je vozilo čisto."],["Izlaz","Možete izaći."]],f:"Uvijek slijedite upute osoblja.",lb:"Jezik"}},
{c:"is",n:"Íslenska",t:{title:"Afmengun ökutækis — Hvað gerist núna",intro:"Þú ert á afmengunarstöð. Þjálfað starfsfólk hreinsar ökutækið þitt. Þú ert í öruggum höndum. Vinsamlegast lestu þessar reglur.",rt:"Mikilvægar reglur",r:["Slökktu á loftræstingunni.","Vertu áfram í ökutækinu. Hafðu gluggana lokaða.","Neyðartilvik? Kveiktu á hættuljósunum. Hjálp kemur til þín."],time:"Heildartími: u.þ.b. 35 mínútur",st:"Skrefin 6",s:[["Leiðbeiningar","Starfsfólkið gefur þér fyrirmæli."],["Forþvottur","Ökutækið er skolað með vatni."],["Afmengunarefni","Efnið er borið á. Vinsamlegast bíddu."],["Lokaskolun","Efnið er þvegið af."],["Mæling","Mæling staðfestir að ökutækið sé hreint."],["Útkeyrsla","Þú mátt aka út."]],f:"Fylgdu alltaf fyrirmælum starfsfólksins.",lb:"Tungumál"}},
{c:"it",n:"Italiano",t:{title:"Decontaminazione del veicolo — Cosa succede ora",intro:"Si trova in una stazione di decontaminazione. Personale addestrato pulirà il suo veicolo. È al sicuro. Legga queste regole, per favore.",rt:"Regole importanti",r:["Spenga la ventilazione.","Rimanga nel veicolo. Tenga i finestrini chiusi.","Emergenza? Accenda le luci di emergenza. I soccorsi verranno da lei."],time:"Durata totale: circa 35 minuti",st:"Le 6 fasi",s:[["Istruzioni","Il personale le dà indicazioni."],["Prelavaggio","Il veicolo viene sciacquato con acqua."],["Agente decontaminante","L'agente viene applicato. Attenda, per favore."],["Risciacquo finale","L'agente viene lavato via."],["Controllo","Una misurazione conferma che il veicolo è pulito."],["Uscita","Può uscire."]],f:"Segua sempre le istruzioni del personale.",lb:"Lingua"}},
{c:"lv",n:"Latviešu",t:{title:"Transportlīdzekļa dekontaminācija — Kas notiks tagad",intro:"Jūs atrodaties dekontaminācijas punktā. Apmācīts personāls notīrīs jūsu transportlīdzekli. Jūs esat drošībā. Lūdzu, izlasiet šos noteikumus.",rt:"Svarīgi noteikumi",r:["Izslēdziet ventilāciju.","Palieciet transportlīdzeklī. Turiet logus aizvērtus.","Ārkārtas situācija? Ieslēdziet avārijas gaismas. Palīdzība ieradīsies pie jums."],time:"Kopējais laiks: apm. 35 minūtes",st:"6 soļi",s:[["Instruktāža","Personāls sniegs jums norādījumus."],["Priekšmazgāšana","Transportlīdzekli noskalo ar ūdeni."],["Dekontaminācijas līdzeklis","Līdzekli uzklāj. Lūdzu, uzgaidiet."],["Beigu skalošana","Līdzekli nomazgā."],["Mērījums","Mērījums apstiprina, ka transportlīdzeklis ir tīrs."],["Izbraukšana","Varat izbraukt."]],f:"Vienmēr ievērojiet personāla norādījumus.",lb:"Valoda"}},
{c:"lt",n:"Lietuvių",t:{title:"Transporto priemonės dekontaminacija — Kas vyks dabar",intro:"Esate dekontaminacijos punkte. Apmokytas personalas išvalys jūsų transporto priemonę. Esate saugūs. Perskaitykite šias taisykles.",rt:"Svarbios taisyklės",r:["Išjunkite ventiliaciją.","Likite transporto priemonėje. Laikykite langus uždarytus.","Avarinė situacija? Įjunkite avarinius žibintus. Pagalba atvyks pas jus."],time:"Bendras laikas: apie 35 minutes",st:"6 žingsniai",s:[["Instruktažas","Personalas duos jums nurodymus."],["Pirminis plovimas","Transporto priemonė nuplaunama vandeniu."],["Dekontaminacijos priemonė","Priemonė užpurškiama. Prašome palaukti."],["Galutinis plovimas","Priemonė nuplaunama."],["Matavimas","Matavimas patvirtina, kad transporto priemonė švari."],["Išvažiavimas","Galite išvažiuoti."]],f:"Visada laikykitės personalo nurodymų.",lb:"Kalba"}},
{c:"hu",n:"Magyar",t:{title:"Jármű-dekontamináció — Mi történik most",intro:"Ön egy dekontaminációs állomáson van. Képzett személyzet tisztítja meg a járművét. Biztonságban van. Kérjük, olvassa el ezeket a szabályokat.",rt:"Fontos szabályok",r:["Kapcsolja KI a szellőzést.","Maradjon a járműben. Tartsa zárva az ablakokat.","Vészhelyzet? Kapcsolja BE a vészvillogót. A segítség Önhöz megy."],time:"Teljes idő: kb. 35 perc",st:"A 6 lépés",s:[["Eligazítás","A személyzet utasításokat ad."],["Előmosás","A járművet vízzel leöblítik."],["Dekontamináló szer","A szert felviszik. Kérjük, várjon."],["Utolsó öblítés","A szert lemossák."],["Mérés","A mérés megerősíti, hogy a jármű tiszta."],["Kihajtás","Kihajthat."]],f:"Mindig kövesse a személyzet utasításait.",lb:"Nyelv"}},
{c:"mt",n:"Malti",t:{title:"Dekontaminazzjoni tal-vettura — X'se jiġri issa",intro:"Inti fi stazzjon tad-dekontaminazzjoni. Persunal imħarreġ se jnaddaf il-vettura tiegħek. Inti fis-sigurtà. Jekk jogħġbok aqra dawn ir-regoli.",rt:"Regoli importanti",r:["Itfi l-ventilazzjoni.","Ibqa' fil-vettura. Żomm it-twieqi magħluqin.","Emerġenza? Ixgħel id-dwal ta' emerġenza. L-għajnuna tiġi għandek."],time:"Ħin totali: madwar 35 minuta",st:"Is-6 passi",s:[["Struzzjonijiet","Il-persunal jagħtik struzzjonijiet."],["Ħasil minn qabel","Il-vettura titlaħlaħ bl-ilma."],["Aġent tad-dekontaminazzjoni","L-aġent jiġi applikat. Jekk jogħġbok stenna."],["Tlaħliħ finali","L-aġent jinħasel."],["Kejl","Kejl jikkonferma li l-vettura hija nadifa."],["Ħruġ","Tista' toħroġ."]],f:"Dejjem segwi l-istruzzjonijiet tal-persunal.",lb:"Lingwa"}},
{c:"nl",n:"Nederlands",t:{title:"Voertuigdecontaminatie — Wat er nu gebeurt",intro:"U bent bij een decontaminatiepost. Getraind personeel reinigt uw voertuig. U bent veilig. Lees deze regels alstublieft.",rt:"Belangrijke regels",r:["Zet de ventilatie UIT.","Blijf in uw voertuig. Houd de ramen gesloten.","Noodgeval? Zet de alarmlichten AAN. Hulp komt naar u toe."],time:"Totale duur: ca. 35 minuten",st:"De 6 stappen",s:[["Instructie","Het personeel geeft u aanwijzingen."],["Voorwas","Uw voertuig wordt met water afgespoeld."],["Decontaminatiemiddel","Het middel wordt aangebracht. Even wachten a.u.b."],["Naspoelen","Het middel wordt afgewassen."],["Meting","Een meting bevestigt dat uw voertuig schoon is."],["Uitrit","U mag wegrijden."]],f:"Volg altijd de aanwijzingen van het personeel.",lb:"Taal"}},
{c:"no",n:"Norsk",t:{title:"Dekontaminering av kjøretøy — Hva skjer nå",intro:"Du er ved en dekontamineringsstasjon. Opplært personell rengjør kjøretøyet ditt. Du er trygg. Les disse reglene.",rt:"Viktige regler",r:["Slå AV ventilasjonen.","Bli i kjøretøyet. Hold vinduene lukket.","Nødsituasjon? Slå PÅ nødblinken. Hjelpen kommer til deg."],time:"Total tid: ca. 35 minutter",st:"De 6 trinnene",s:[["Instruksjon","Personellet gir deg instruksjoner."],["Forvask","Kjøretøyet spyles med vann."],["Dekontamineringsmiddel","Middelet påføres. Vennligst vent."],["Etterskylling","Middelet vaskes av."],["Måling","En måling bekrefter at kjøretøyet er rent."],["Utkjøring","Du kan kjøre ut."]],f:"Følg alltid personellets instruksjoner.",lb:"Språk"}},
{c:"pl",n:"Polski",t:{title:"Dekontaminacja pojazdu — Co się teraz stanie",intro:"Znajdują się Państwo na stanowisku dekontaminacji. Przeszkolony personel oczyści Państwa pojazd. Są Państwo bezpieczni. Prosimy przeczytać te zasady.",rt:"Ważne zasady",r:["Wyłącz wentylację.","Pozostań w pojeździe. Nie otwieraj okien.","Nagły wypadek? Włącz światła awaryjne. Pomoc przyjdzie do Ciebie."],time:"Całkowity czas: ok. 35 minut",st:"6 kroków",s:[["Instruktaż","Personel przekaże instrukcje."],["Mycie wstępne","Pojazd zostanie spłukany wodą."],["Środek dekontaminacyjny","Środek zostanie naniesiony. Prosimy czekać."],["Mycie końcowe","Środek zostanie zmyty."],["Pomiar","Pomiar potwierdzi, że pojazd jest czysty."],["Wyjazd","Można wyjechać."]],f:"Zawsze stosuj się do poleceń personelu.",lb:"Język"}},
{c:"pt",n:"Português",t:{title:"Descontaminação do veículo — O que vai acontecer",intro:"Está num posto de descontaminação. Pessoal treinado vai limpar o seu veículo. Está em segurança. Leia estas regras, por favor.",rt:"Regras importantes",r:["Desligue a ventilação.","Fique dentro do veículo. Mantenha as janelas fechadas.","Emergência? Ligue o pisca-alerta. A ajuda irá até si."],time:"Duração total: aprox. 35 minutos",st:"As 6 etapas",s:[["Instruções","O pessoal dá-lhe instruções."],["Pré-lavagem","O veículo é enxaguado com água."],["Agente de descontaminação","O agente é aplicado. Aguarde, por favor."],["Enxaguamento final","O agente é lavado."],["Controlo","Uma medição confirma que o veículo está limpo."],["Saída","Pode sair."]],f:"Siga sempre as instruções do pessoal.",lb:"Idioma"}},
{c:"ro",n:"Română",t:{title:"Decontaminarea vehiculului — Ce urmează",intro:"Vă aflați la un punct de decontaminare. Personal instruit vă va curăța vehiculul. Sunteți în siguranță. Vă rugăm să citiți aceste reguli.",rt:"Reguli importante",r:["Opriți ventilația.","Rămâneți în vehicul. Țineți geamurile închise.","Urgență? Porniți luminile de avarie. Ajutorul va veni la dumneavoastră."],time:"Durata totală: aprox. 35 de minute",st:"Cei 6 pași",s:[["Instructaj","Personalul vă dă instrucțiuni."],["Prespălare","Vehiculul este clătit cu apă."],["Agent de decontaminare","Agentul este aplicat. Vă rugăm să așteptați."],["Clătire finală","Agentul este spălat."],["Măsurare","O măsurare confirmă că vehiculul este curat."],["Ieșire","Puteți ieși."]],f:"Urmați întotdeauna instrucțiunile personalului.",lb:"Limba"}},
{c:"sq",n:"Shqip",t:{title:"Dekontaminimi i automjetit — Çfarë do të ndodhë",intro:"Ndodheni në një pikë dekontaminimi. Personeli i trajnuar do të pastrojë automjetin tuaj. Jeni të sigurt. Ju lutemi lexoni këto rregulla.",rt:"Rregulla të rëndësishme",r:["Fikni ventilimin.","Qëndroni në automjet. Mbani dritaret të mbyllura.","Urgjencë? Ndizni dritat e alarmit. Ndihma do të vijë tek ju."],time:"Koha totale: rreth 35 minuta",st:"6 hapat",s:[["Udhëzimi","Personeli ju jep udhëzime."],["Larja paraprake","Automjeti shpëlahet me ujë."],["Agjenti i dekontaminimit","Agjenti aplikohet. Ju lutemi prisni."],["Shpëlarja përfundimtare","Agjenti lahet."],["Matja","Një matje konfirmon se automjeti është i pastër."],["Dalja","Mund të dilni."]],f:"Ndiqni gjithmonë udhëzimet e personelit.",lb:"Gjuha"}},
{c:"sk",n:"Slovenčina",t:{title:"Dekontaminácia vozidla — Čo sa bude diať",intro:"Nachádzate sa na dekontaminačnom stanovišti. Vyškolený personál vyčistí vaše vozidlo. Ste v bezpečí. Prečítajte si, prosím, tieto pravidlá.",rt:"Dôležité pravidlá",r:["Vypnite ventiláciu.","Zostaňte vo vozidle. Nechajte okná zatvorené.","Núdzová situácia? Zapnite výstražné svetlá. Pomoc príde k vám."],time:"Celkový čas: cca 35 minút",st:"6 krokov",s:[["Poučenie","Personál vám dá pokyny."],["Predumytie","Vozidlo sa opláchne vodou."],["Dekontaminačný prostriedok","Prostriedok sa nanesie. Prosím, čakajte."],["Záverečný oplach","Prostriedok sa zmyje."],["Meranie","Meranie potvrdí, že vozidlo je čisté."],["Výjazd","Môžete vyjsť."]],f:"Vždy sa riaďte pokynmi personálu.",lb:"Jazyk"}},
{c:"sl",n:"Slovenščina",t:{title:"Dekontaminacija vozila — Kaj sledi",intro:"Ste na dekontaminacijski postaji. Usposobljeno osebje bo očistilo vaše vozilo. Varni ste. Preberite ta pravila, prosimo.",rt:"Pomembna pravila",r:["Izklopite prezračevanje.","Ostanite v vozilu. Okna naj bodo zaprta.","Nujni primer? Vklopite varnostne utripalke. Pomoč bo prišla k vam."],time:"Skupni čas: pribl. 35 minut",st:"6 korakov",s:[["Navodila","Osebje vam da navodila."],["Predpranje","Vozilo se spere z vodo."],["Dekontaminacijsko sredstvo","Sredstvo se nanese. Prosimo, počakajte."],["Končno izpiranje","Sredstvo se spere."],["Meritev","Meritev potrdi, da je vozilo čisto."],["Izvoz","Lahko odpeljete."]],f:"Vedno upoštevajte navodila osebja.",lb:"Jezik"}},
{c:"fi",n:"Suomi",t:{title:"Ajoneuvon dekontaminaatio — Mitä nyt tapahtuu",intro:"Olet dekontaminaatioasemalla. Koulutettu henkilöstö puhdistaa ajoneuvosi. Olet turvassa. Lue nämä säännöt.",rt:"Tärkeät säännöt",r:["Sammuta ilmanvaihto.","Pysy ajoneuvossa. Pidä ikkunat kiinni.","Hätätilanne? Kytke hätävilkut päälle. Apu tulee luoksesi."],time:"Kokonaisaika: n. 35 minuuttia",st:"6 vaihetta",s:[["Ohjeistus","Henkilöstö antaa sinulle ohjeet."],["Esipesu","Ajoneuvo huuhdellaan vedellä."],["Dekontaminaatioaine","Aine levitetään. Odota, kiitos."],["Loppuhuuhtelu","Aine pestään pois."],["Mittaus","Mittaus vahvistaa, että ajoneuvo on puhdas."],["Poistuminen","Voit ajaa ulos."]],f:"Noudata aina henkilöstön ohjeita.",lb:"Kieli"}},
{c:"sv",n:"Svenska",t:{title:"Fordonsdekontaminering — Vad händer nu",intro:"Du är vid en dekontamineringsstation. Utbildad personal rengör ditt fordon. Du är i säkerhet. Läs dessa regler.",rt:"Viktiga regler",r:["Stäng AV ventilationen.","Stanna i fordonet. Håll fönstren stängda.","Nödsituation? Slå PÅ varningsblinkers. Hjälp kommer till dig."],time:"Total tid: ca 35 minuter",st:"De 6 stegen",s:[["Genomgång","Personalen ger dig instruktioner."],["Förtvätt","Fordonet spolas med vatten."],["Dekontamineringsmedel","Medlet appliceras. Vänta, tack."],["Sköljning","Medlet tvättas av."],["Mätning","En mätning bekräftar att fordonet är rent."],["Utfart","Du får köra ut."]],f:"Följ alltid personalens instruktioner.",lb:"Språk"}},
{c:"tr",n:"Türkçe",t:{title:"Araç dekontaminasyonu — Şimdi ne olacak",intro:"Bir dekontaminasyon istasyonundasınız. Eğitimli personel aracınızı temizleyecek. Güvendesiniz. Lütfen bu kuralları okuyun.",rt:"Önemli kurallar",r:["Havalandırmayı KAPATIN.","Aracınızın içinde kalın. Camları kapalı tutun.","Acil durum mu? Dörtlüleri YAKIN. Yardım size gelecek."],time:"Toplam süre: yakl. 35 dakika",st:"6 adım",s:[["Bilgilendirme","Personel size talimat verir."],["Ön yıkama","Aracınız suyla durulanır."],["Dekontaminasyon maddesi","Madde uygulanır. Lütfen bekleyin."],["Son durulama","Madde yıkanır."],["Ölçüm","Ölçüm, aracınızın temiz olduğunu doğrular."],["Çıkış","Çıkabilirsiniz."]],f:"Her zaman personelin talimatlarına uyun.",lb:"Dil"}},
{c:"el",n:"Ελληνικά",t:{title:"Απορρύπανση οχήματος — Τι θα συμβεί τώρα",intro:"Βρίσκεστε σε σταθμό απορρύπανσης. Εκπαιδευμένο προσωπικό θα καθαρίσει το όχημά σας. Είστε ασφαλείς. Παρακαλούμε διαβάστε αυτούς τους κανόνες.",rt:"Σημαντικοί κανόνες",r:["Κλείστε τον εξαερισμό.","Μείνετε μέσα στο όχημα. Κρατήστε τα παράθυρα κλειστά.","Έκτακτη ανάγκη; Ανάψτε τα αλάρμ. Η βοήθεια θα έρθει σε εσάς."],time:"Συνολικός χρόνος: περ. 35 λεπτά",st:"Τα 6 βήματα",s:[["Ενημέρωση","Το προσωπικό σάς δίνει οδηγίες."],["Πρόπλυση","Το όχημα ξεπλένεται με νερό."],["Μέσο απορρύπανσης","Το μέσο εφαρμόζεται. Παρακαλούμε περιμένετε."],["Τελικό ξέπλυμα","Το μέσο ξεπλένεται."],["Μέτρηση","Μια μέτρηση επιβεβαιώνει ότι το όχημα είναι καθαρό."],["Έξοδος","Μπορείτε να βγείτε."]],f:"Ακολουθείτε πάντα τις οδηγίες του προσωπικού.",lb:"Γλώσσα"}},
{c:"bg",n:"Български",t:{title:"Деконтаминация на автомобила — Какво предстои",intro:"Намирате се на пункт за деконтаминация. Обучен персонал ще почисти автомобила ви. В безопасност сте. Моля, прочетете тези правила.",rt:"Важни правила",r:["Изключете вентилацията.","Останете в автомобила. Дръжте прозорците затворени.","Спешен случай? Включете аварийните светлини. Помощта ще дойде при вас."],time:"Общо време: около 35 минути",st:"6-те стъпки",s:[["Инструктаж","Персоналът ще ви даде указания."],["Предварително измиване","Автомобилът се изплаква с вода."],["Деконтаминиращо средство","Средството се нанася. Моля, изчакайте."],["Финално изплакване","Средството се измива."],["Измерване","Измерване потвърждава, че автомобилът е чист."],["Изход","Можете да излезете."]],f:"Винаги следвайте указанията на персонала.",lb:"Език"}},
{c:"mk",n:"Македонски",t:{title:"Деконтаминација на возилото — Што следи",intro:"Се наоѓате на пункт за деконтаминација. Обучен персонал ќе го исчисти вашето возило. Безбедни сте. Ве молиме прочитајте ги овие правила.",rt:"Важни правила",r:["Исклучете ја вентилацијата.","Останете во возилото. Држете ги прозорците затворени.","Итен случај? Вклучете ги сите четири трепкачи. Помошта ќе дојде кај вас."],time:"Вкупно време: околу 35 минути",st:"6-те чекори",s:[["Инструктажа","Персоналот ви дава упатства."],["Претходно миење","Возилото се плакне со вода."],["Средство за деконтаминација","Средството се нанесува. Ве молиме почекајте."],["Завршно плакнење","Средството се измива."],["Мерење","Мерењето потврдува дека возилото е чисто."],["Излез","Може да излезете."]],f:"Секогаш следете ги упатствата на персоналот.",lb:"Јазик"}},
{c:"ru",n:"Русский",t:{title:"Деконтаминация автомобиля — Что будет происходить",intro:"Вы находитесь на пункте деконтаминации. Обученный персонал очистит ваш автомобиль. Вы в безопасности. Пожалуйста, прочитайте эти правила.",rt:"Важные правила",r:["Выключите вентиляцию.","Оставайтесь в автомобиле. Держите окна закрытыми.","Чрезвычайная ситуация? Включите аварийную сигнализацию. Помощь придёт к вам."],time:"Общее время: около 35 минут",st:"6 шагов",s:[["Инструктаж","Персонал даст вам указания."],["Предварительная мойка","Автомобиль ополаскивают водой."],["Деконтаминационное средство","Средство наносится. Пожалуйста, подождите."],["Финальная мойка","Средство смывается."],["Измерение","Измерение подтверждает, что автомобиль чист."],["Выезд","Можете выезжать."]],f:"Всегда следуйте указаниям персонала.",lb:"Язык"}},
{c:"sr",n:"Српски",t:{title:"Деконтаминација возила — Шта следи",intro:"Налазите се на месту за деконтаминацију. Обучено особље ће очистити ваше возило. Безбедни сте. Молимо прочитајте ова правила.",rt:"Важна правила",r:["Искључите вентилацију.","Останите у возилу. Држите прозоре затворене.","Хитан случај? Укључите сва четири мигавца. Помоћ ће доћи до вас."],time:"Укупно време: око 35 минута",st:"6 корака",s:[["Упутства","Особље вам даје упутства."],["Претпрање","Возило се испира водом."],["Средство за деконтаминацију","Средство се наноси. Молимо сачекајте."],["Завршно испирање","Средство се испира."],["Мерење","Мерење потврђује да је возило чисто."],["Излаз","Можете изаћи."]],f:"Увек следите упутства особља.",lb:"Језик"}},
{c:"uk",n:"Українська",t:{title:"Деконтамінація автомобіля — Що зараз відбуватиметься",intro:"Ви на пункті деконтамінації. Навчений персонал очистить ваш автомобіль. Ви в безпеці. Будь ласка, прочитайте ці правила.",rt:"Важливі правила",r:["Вимкніть вентиляцію.","Залишайтеся в автомобілі. Тримайте вікна зачиненими.","Надзвичайна ситуація? Увімкніть аварійні вогні. Допомога прийде до вас."],time:"Загальний час: близько 35 хвилин",st:"6 кроків",s:[["Інструктаж","Персонал дасть вам вказівки."],["Попереднє миття","Автомобіль обполіскують водою."],["Деконтамінаційний засіб","Засіб наносять. Будь ласка, зачекайте."],["Остаточне миття","Засіб змивають."],["Вимірювання","Вимірювання підтверджує, що автомобіль чистий."],["Виїзд","Можете виїжджати."]],f:"Завжди виконуйте вказівки персоналу.",lb:"Мова"}},
{c:"ca",n:"Català",t:{title:"Descontaminació del vehicle — Què passarà ara",intro:"Es troba en un punt de descontaminació. Personal format netejarà el seu vehicle. Està segur. Si us plau, llegeixi aquestes normes.",rt:"Normes importants",r:["Apagui la ventilació.","Quedi's dins del vehicle. Mantingui les finestres tancades.","Emergència? Encengui els llums d'emergència. L'ajuda vindrà cap a vostè."],time:"Durada total: aprox. 35 minuts",st:"Els 6 passos",s:[["Instruccions","El personal li donarà indicacions."],["Prerentat","El vehicle s'esbandeix amb aigua."],["Agent descontaminant","S'aplica l'agent. Esperi, si us plau."],["Esbandida final","Es renta l'agent."],["Control","Una mesura confirma que el vehicle està net."],["Sortida","Pot sortir."]],f:"Segueixi sempre les indicacions del personal.",lb:"Llengua"}},

{c:"be",n:"Беларуская",t:{title:"Дэкантамінацыя аўтамабіля — Што будзе адбывацца",intro:"Вы знаходзіцеся на пункце дэкантамінацыі. Навучаны персанал ачысціць ваш аўтамабіль. Вы ў бяспецы. Калі ласка, прачытайце гэтыя правілы.",rt:"Важныя правілы",r:["Выключыце вентыляцыю.","Заставайцеся ў аўтамабілі. Трымайце вокны зачыненымі.","Надзвычайная сітуацыя? Уключыце аварыйную сігналізацыю. Дапамога прыйдзе да вас."],time:"Агульны час: каля 35 хвілін",st:"6 крокаў",s:[["Інструктаж","Персанал дасць вам указанні."],["Папярэдняя мыйка","Аўтамабіль апаласкваюць вадой."],["Дэкантамінацыйны сродак","Сродак наносіцца. Калі ласка, пачакайце."],["Фінальная мыйка","Сродак змываюць."],["Вымярэнне","Вымярэнне пацвярджае, што аўтамабіль чысты."],["Выезд","Можаце выязджаць."]],f:"Заўсёды выконвайце ўказанні персаналу.",lb:"Мова"}},

];

const $ = id => document.getElementById(id);
const picker = $("picker"), content = $("content"), grid = $("langGrid");

// Sprachraster aufbauen
L.forEach((lang, i) => {
  const b = document.createElement("button");
  b.type = "button";
  b.textContent = lang.n;
  b.setAttribute("lang", lang.c);
  b.addEventListener("click", () => show(i));
  grid.appendChild(b);
});

function show(i){
  const {c, t} = L[i];
  document.documentElement.lang = c;
  $("hdr").textContent = t.title;
  $("cTitle").textContent = t.title;
  $("cIntro").textContent = t.intro;
  $("cRulesTitle").textContent = t.rt;
  t.r.forEach((txt, k) => $("cRule" + k).textContent = txt);
  $("cTime").textContent = t.time;
  $("cStepsTitle").textContent = t.st;
  const ol = $("cSteps");
  ol.innerHTML = "";
  t.s.forEach(([name, desc], k) => {
    const li = document.createElement("li");
    const num = document.createElement("div");
    num.className = "stepnum"; num.textContent = k + 1;
    const body = document.createElement("div");
    body.className = "stepbody";
    const b = document.createElement("b"); b.textContent = name;
    const sp = document.createElement("span"); sp.textContent = desc;
    const tm = document.createElement("span"); tm.className = "t";
    tm.textContent = "≈ " + STEP_MINUTES[k] + " min";
    body.append(b, sp, document.createElement("br"), tm);
    li.append(num, body);
    ol.appendChild(li);
  });
  const fq = FAQ[c];
  $("cFaqTitle").textContent = fq.t;
  const box = $("cFaq");
  box.innerHTML = "";
  fq.q.forEach(([q, a]) => {
    const d = document.createElement("details");
    const s = document.createElement("summary"); s.textContent = q;
    const p = document.createElement("p"); p.textContent = a;
    d.append(s, p); box.appendChild(d);
  });
  $("cFooter").textContent = "ℹ️ " + t.f;
  $("backBtn").textContent = "🌐 " + t.lb;
  picker.classList.add("hidden");
  content.classList.remove("hidden");
  window.scrollTo(0, 0);
}

$("backBtn").addEventListener("click", () => {
  content.classList.add("hidden");
  picker.classList.remove("hidden");
  document.documentElement.lang = "en";
  $("hdr").textContent = "Vehicle Decontamination — Information";
  window.scrollTo(0, 0);
});

// Gerätesprache vorschlagen: passende Sprache direkt öffnen, sonst Auswahl zeigen
(function autoLang(){
  const prefs = (navigator.languages || [navigator.language || ""]).map(x => x.toLowerCase());
  for (const p of prefs){
    const base = p.split("-")[0];
    const idx = L.findIndex(l => l.c === base);
    if (idx >= 0){ show(idx); return; }
  }
})();
</script>
