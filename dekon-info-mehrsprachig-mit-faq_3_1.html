<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rescEU CBRN Decon Germany — Vehicle Decontamination Info</title>
<!--
  HINWEIS FÜR DIE REDAKTION:
  Alle Übersetzungen wurden maschinell erstellt und MÜSSEN vor dem
  Einsatz von Muttersprachlern bzw. amtlichen Übersetzern geprüft werden
  (sicherheitsrelevante Kommunikation). Zeiten zentral in STEP_MINUTES pflegen.
-->
<style>
  :root{
    --blue:#00307A; --blue-dark:#001F52; --red:#C1121F; --red-bg:#FBEDED;
    --red-text:#7A0C14; --green:#1B7A3D; --ink:#1A1C22; --muted:#5A5E6B;
    --bg:#F3F5F9; --card:#FFFFFF; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:17px}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45; min-height:100vh;
  }
  header{
    background:var(--blue); color:#fff; padding:1rem 1.1rem 1.1rem;
    border-bottom:4px solid #F59E0B;
  }
  header .hwrap{display:flex; justify-content:space-between; align-items:flex-start; gap:.8rem}
  header .org{font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; opacity:.85}
  header h1{font-size:1.25rem; line-height:1.25; margin-top:.2rem; font-weight:700}
  .logos{display:flex; flex-direction:column; align-items:flex-end; gap:.4rem; flex-shrink:0}
  .logos img{display:block; background:#fff; border-radius:8px; padding:.25rem .35rem}
  .logos .l-resc{width:70px; height:auto}
  .logos .l-unit{width:132px; height:auto}
  @media (min-width:480px){ .logos .l-resc{width:84px} .logos .l-unit{width:160px} }
  main{max-width:640px; margin:0 auto; padding:1rem 1rem 3rem}
  .hidden{display:none !important}

  /* Sprachauswahl */
  .pick-title{font-size:1.05rem; font-weight:700; margin:.4rem 0 .9rem; text-align:center}
  .lang-grid{display:grid; grid-template-columns:1fr 1fr; gap:.55rem}
  .lang-grid button{
    min-height:48px; padding:.55rem .6rem; font-size:1rem; font-weight:600;
    background:var(--card); color:var(--blue-dark);
    border:1.5px solid #C9D2E3; border-radius:var(--radius); cursor:pointer;
  }
  .lang-grid button:active{background:#E7EDF8}

  /* Inhaltsansicht */
  .topbar{display:flex; justify-content:flex-end; margin-bottom:.6rem}
  .topbar button{
    min-height:44px; padding:.4rem .9rem; font-size:.95rem; font-weight:600;
    background:var(--card); color:var(--blue-dark);
    border:1.5px solid #C9D2E3; border-radius:999px; cursor:pointer;
  }
  h2.page-title{font-size:1.35rem; line-height:1.3; margin:.2rem 0 .6rem}
  p.intro{font-size:1.02rem; margin-bottom:1rem}

  .rules{
    background:var(--red-bg); border:2px solid var(--red);
    border-radius:var(--radius); padding:1rem; margin-bottom:1rem;
  }
  .rules h3{color:var(--red-text); font-size:1.05rem; text-transform:uppercase;
    letter-spacing:.04em; margin-bottom:.7rem}
  .rule{display:flex; gap:.7rem; align-items:flex-start; padding:.45rem 0;
    font-weight:600; color:var(--red-text); font-size:1.02rem}
  .rule + .rule{border-top:1px solid #EBC7C9}
  .rule .ico{flex:0 0 2.1rem; height:2.1rem; background:#fff; border:1.5px solid var(--red);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:1.15rem}

  .timebadge{
    display:inline-flex; align-items:center; gap:.5rem; background:var(--card);
    border:1.5px solid #C9D2E3; border-radius:999px; padding:.5rem 1rem;
    font-weight:700; color:var(--blue-dark); margin-bottom:1.1rem; font-size:1rem;
  }

  h3.steps-title{font-size:1.05rem; margin-bottom:.6rem}
  ol.steps{list-style:none}
  ol.steps li{
    display:flex; gap:.8rem; background:var(--card); border:1px solid #DDE3EE;
    border-radius:var(--radius); padding:.85rem .9rem; margin-bottom:.55rem;
  }
  .stepnum{
    flex:0 0 2.2rem; height:2.2rem; border-radius:50%; background:var(--blue);
    color:#fff; font-weight:700; font-size:1.05rem;
    display:flex; align-items:center; justify-content:center;
  }
  ol.steps li:last-child .stepnum{background:var(--green)}
  .stepbody b{display:block; font-size:1.02rem}
  .stepbody span{color:var(--muted); font-size:.95rem}
  .stepbody .t{display:inline-block; margin-top:.25rem; font-size:.85rem; font-weight:700;
    color:var(--blue-dark); background:#E7EDF8; border-radius:999px; padding:.1rem .6rem}

  .footer-note{
    margin-top:1.2rem; padding:.9rem 1rem; background:#FFF7E6;
    border:1.5px solid #F59E0B; border-radius:var(--radius); font-weight:600; font-size:1rem;
  }
  #cFaq details{background:var(--card); border:1px solid #DDE3EE;
    border-radius:var(--radius); margin-bottom:.55rem; overflow:hidden}
  #cFaq summary{padding:.85rem .9rem; font-weight:700; font-size:1rem;
    cursor:pointer; min-height:44px; color:var(--blue-dark)}
  #cFaq details[open] summary{border-bottom:1px solid #DDE3EE}
  #cFaq details p{padding:.75rem .9rem .9rem; font-size:.98rem}
  button:focus-visible,a:focus-visible{outline:3px solid #F59E0B; outline-offset:2px}
  @media (prefers-reduced-motion: no-preference){
    .view{animation:fade .18s ease-out}
    @keyframes fade{from{opacity:0}to{opacity:1}}
  }
</style>
</head>
